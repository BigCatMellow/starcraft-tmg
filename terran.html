<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Terran Army Builder - StarCraft TMG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #1a1a1a;
      --panel: #242424;
      --panel-2: #2a2a2a;
      --panel-3: #303030;
      --text: #f0eee8;
      --muted: #a8a299;
      --border: #3a3a3a;
      --accent: #2F6DB3;
      --success: #22c55e;
      --warning: #fbbf24;
      --error: #ef4444;
      --gas: #22d3ee;
      --role-hero: #f59e0b;
      --role-elite: #a855f7;
      --role-core: #3b82f6;
      --role-support: #22c55e;
      --role-other: #6b7280;
      --tactical: #06b6d4;
      --glossary: #ec4899;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      padding-bottom: 65px;
    }
    
    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 12px;
    }
    
    /* Header */
    .header {
      text-align: center;
      padding: 16px 0 20px;
      margin-bottom: 12px;
      border-bottom: 2px solid var(--accent);
    }
    .header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .header h1 span { color: var(--accent); }
    
    /* Sticky Header */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 250;
      background: rgba(26,26,26,0.98);
      backdrop-filter: blur(10px);
      margin: 0 -12px;
      padding: 12px 12px 10px;
      border-bottom: 1px solid var(--border);
    }
    
    /* Battle Size - only shown in Factions tab */
    .battle-size-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .battle-size-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .battle-size-options {
      display: flex;
      background: var(--panel);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .battle-size-option {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .battle-size-option.active {
      color: var(--text);
      background: var(--accent);
    }
    .battle-size-option:not(.active):hover {
      color: var(--text);
      background: var(--panel-2);
    }

    .resource-stats {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      padding: 10px 0 6px;
      transition: all 0.25s ease;
    }
    .resource-stat {
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s ease;
    }
    .resource-stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 600;
      transition: all 0.25s ease;
    }
    .resource-stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      transition: all 0.25s ease;
    }
    .resource-stat-value.minerals { color: var(--warning); }
    .resource-stat-value.gas { color: var(--gas); }
    .resource-stat-value.supply { color: var(--accent); }
    .resource-stat-value.over { color: var(--error); }
    
    .sticky-header.compact .resource-stats {
      gap: 20px;
      padding: 0;
      margin-bottom: 8px;
    }
    .sticky-header.compact .resource-stat {
      gap: 6px;
    }
    .sticky-header.compact .resource-stat-label {
      font-size: 0.65rem;
    }
    .sticky-header.compact .resource-stat-value {
      font-size: 1rem;
    }
    
    /* Slots row */
    .slots-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
      justify-content: center;
    }
    .slot-badge {
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 100px;
      font-weight: 600;
    }
    .slot-badge.ok { background: rgba(34,197,94,0.15); color: var(--success); }
    .slot-badge.over { background: rgba(239,68,68,0.15); color: var(--error); }
    
    /* Slots in header */
    .slots-compact {
      display: flex;
      justify-content: center;
      gap: 12px;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 8px;
    }
    .slots-compact .slot-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .slots-compact .slot-label {
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .slots-compact .slot-value {
      font-weight: 700;
    }
    .slots-compact .slot-value.ok { color: var(--success); }
    .slots-compact .slot-value.over { color: var(--error); }
    .slots-compact .slot-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .slots-compact .slot-dot.hero { background: var(--role-hero); }
    .slots-compact .slot-dot.elite { background: var(--role-elite); }
    .slots-compact .slot-dot.core { background: var(--role-core); }
    .slots-compact .slot-dot.support { background: var(--role-support); }
    
    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0 16px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-text {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    
    /* Army Role Group */
    .army-role-group {
      margin-bottom: 16px;
      background: var(--panel);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
    }
    .army-role-group:last-child { margin-bottom: 0; }
    .army-role-group.role-hero { border-left-color: var(--role-hero); }
    .army-role-group.role-elite { border-left-color: var(--role-elite); }
    .army-role-group.role-core { border-left-color: var(--role-core); }
    .army-role-group.role-support { border-left-color: var(--role-support); }
    .army-role-group.role-other { border-left-color: var(--role-other); }
    
    .army-role-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      cursor: pointer;
      user-select: none;
    }
    .army-role-group.expanded .army-role-header {
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .army-role-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .army-role-header.role-hero .army-role-dot { background: var(--role-hero); }
    .army-role-header.role-elite .army-role-dot { background: var(--role-elite); }
    .army-role-header.role-core .army-role-dot { background: var(--role-core); }
    .army-role-header.role-support .army-role-dot { background: var(--role-support); }
    .army-role-header.role-other .army-role-dot { background: var(--role-other); }
    .army-role-name {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text);
      flex: 1;
    }
    .army-role-count {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--panel-2);
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* Army Card - Expandable */
    .army-card {
      background: linear-gradient(135deg, #282838 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .army-card:last-child { margin-bottom: 0; }
    .army-card.just-added {
      animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes scaleIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .army-card-header {
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .army-card-info h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .army-card-meta {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .army-card-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .army-card-cost {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--warning);
    }
    .army-card-chevron {
      color: var(--muted);
      font-size: 14px;
      transition: transform 0.2s;
    }
    .army-card.open .army-card-chevron {
      transform: rotate(90deg);
    }
    
    .army-card-body {
      padding: 0 14px 14px;
      border-top: 1px solid var(--border);
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      margin: 12px 0;
    }
    .stat-chip {
      background: var(--panel-3);
      border-radius: 6px;
      padding: 6px 4px;
      text-align: center;
    }
    .stat-abbr {
      display: block;
      font-size: 0.55rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 2px;
    }
    .stat-value {
      font-size: 0.8rem;
      font-weight: 600;
    }
    
    /* Weapon Table */
    .weapon-table {
      background: var(--panel-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .weapon-table:last-child { margin-bottom: 0; }
    .weapon-table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .weapon-table-name {
      font-size: 0.85rem;
      font-weight: 600;
    }
    .weapon-table-phase {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      text-transform: uppercase;
    }
    .weapon-table-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }
    .weapon-table-row.alt {
      background: rgba(0,0,0,0.15);
    }
    .weapon-table-cell {
      padding: 6px 8px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .weapon-table-cell:last-child { border-right: none; }
    .weapon-table-cell span {
      display: block;
      font-size: 0.55rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 2px;
    }
    .weapon-table-cell strong {
      font-size: 0.8rem;
      font-weight: 600;
    }
    .weapon-table-keywords {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    /* Ability Block */
    .ability-block {
      background: var(--panel-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .ability-block:last-child { margin-bottom: 0; }
    .ability-header {
      padding: 10px 12px 4px;
    }
    .ability-title {
      font-size: 0.88rem;
      font-weight: 600;
    }
    .ability-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .ability-body {
      padding: 0 12px 10px;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    
    /* Keyword Highlight */
    .keyword {
      background: rgba(139,92,246,0.2);
      color: #a78bfa;
      padding: 1px 4px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }
    .keyword:hover {
      background: rgba(139,92,246,0.35);
    }
    
    /* Section Block (collapsible) */
    .section-block {
      margin-top: 10px;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      cursor: pointer;
      user-select: none;
    }
    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .section-body {
      padding-top: 8px;
    }
    .chevron {
      color: var(--muted);
      font-size: 14px;
      transition: transform 0.2s;
    }
    .section-block.open .chevron {
      transform: rotate(90deg);
    }
    
    /* Upgrade Toggle */
    .upgrade-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .upgrade-card.selected {
      border-color: var(--accent);
      background: rgba(139,92,246,0.1);
    }
    .upgrade-card:last-child { margin-bottom: 0; }
    .upgrade-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 12px;
    }
    .upgrade-name {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .upgrade-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .upgrade-desc {
      padding: 0 12px 10px;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .upgrade-toggle {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .upgrade-toggle.active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .upgrade-toggle.active::after {
      content: '\\2713';
      color: white;
      font-size: 12px;
      font-weight: 700;
    }
    
    /* Remove Button */
    .btn-remove {
      padding: 8px 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: var(--error);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      width: 100%;
    }
    .btn-remove:hover {
      background: rgba(239,68,68,0.2);
    }
    
    /* Army Actions */
    .army-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .army-btn {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .army-btn:hover {
      background: var(--panel-3);
    }
    .army-btn.danger:hover {
      background: rgba(239,68,68,0.15);
      border-color: var(--error);
      color: var(--error);
    }
    
    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 30px;
      color: #555;
      font-size: 0.85rem;
    }
    
    /* Badge styles */
    .unique-badge {
      font-size: 0.55rem;
      padding: 2px 5px;
      border-radius: 3px;
      background: rgba(245,158,11,0.2);
      color: #f59e0b;
      font-weight: 600;
      text-transform: uppercase;
    }
    .psionic-badge {
      font-size: 0.55rem;
      padding: 2px 5px;
      border-radius: 3px;
      background: rgba(236,72,153,0.2);
      color: #ec4899;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    /* ========================================
       BOTTOM TAB BAR
    ======================================== */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 300;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-btn {
      flex: 1;
      padding: 6px 4px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .tab-btn .tab-icon {
      font-size: 1.1rem;
    }
    .tab-btn.active {
      color: var(--accent);
      background: rgba(147,51,234,0.1);
    }
    .tab-btn:not(.active):hover {
      color: var(--text);
      background: var(--panel-2);
    }
    
    /* Tab Content */
    .tab-content {
      display: none;
      padding-bottom: 70px;
    }
    .tab-content.active {
      display: block;
    }
    .tab-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .tab-title {
      font-weight: 700;
      font-size: 1.1rem;
    }
    
    /* ========================================
       LIBRARY CARDS (Units, Tactical, Factions)
    ======================================== */
    .library-section {
      margin-bottom: 16px;
    }
    .library-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px;
      margin-bottom: 8px;
    }
    .library-section-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .library-section-dot.hero { background: var(--role-hero); }
    .library-section-dot.elite { background: var(--role-elite); }
    .library-section-dot.core { background: var(--role-core); }
    .library-section-dot.support { background: var(--role-support); }
    .library-section-dot.other { background: var(--role-other); }
    .library-section-name {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    
    /* Unit Card in Library */
    .unit-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      border-left: 3px solid var(--border);
    }
    .unit-card.role-hero { border-left-color: var(--role-hero); }
    .unit-card.role-elite { border-left-color: var(--role-elite); }
    .unit-card.role-core { border-left-color: var(--role-core); }
    .unit-card.role-support { border-left-color: var(--role-support); }
    .unit-card.role-other { border-left-color: var(--role-other); }
    .unit-card.in-army {
      border-color: var(--accent);
    }
    
    .unit-card-header {
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }
    .unit-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .unit-name {
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .unit-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .unit-tag {
      padding: 2px 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      cursor: pointer;
    }
    .unit-tag:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .btn-add {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }
    .btn-add:hover {
      transform: scale(1.1);
      box-shadow: 0 0 12px rgba(147,51,234,0.5);
    }
    .btn-add:active {
      transform: scale(0.95);
    }
    
    .unit-card-body {
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }
    
    /* Tier Table */
    .tier-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      margin: 12px 0;
    }
    .tier-table th {
      text-align: left;
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
    }
    .tier-table td {

    }
    .tactical-header {
      padding: 14px 16px;

      user-select: none;
    }
    .tactical-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tactical-name {
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tactical-right {

      align-items: center;
      gap: 10px;

    .tactical-cost {

      color: var(--gas);

    .tactical-summary {

      color: var(--muted);
      margin-top: 4px;

    .tactical-info {

      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;

      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      color: var(--muted);

    .tactical-category-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 12px 4px 8px;
      margin-top: 8px;
      border-bottom: 1px solid var(--border);

    .tactical-category-header:first-child {

    .tactical-category-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--tactical);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .tactical-category-desc {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .tactical-body {
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }
    
    /* Faction Card */
    .faction-card {
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .faction-card:not(.selected) {
      border-color: var(--border);
      opacity: 0.8;
    }
    .faction-card-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .faction-radio {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      background: transparent;
      color: transparent;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .faction-radio.selected {
      border-color: var(--success);
      background: var(--success);
      color: var(--bg);
    }
    .faction-radio:not(.selected):active {
      border-color: var(--accent);
    }
    .faction-card-main {
      flex: 1;
      cursor: pointer;
    }
    .faction-card-top {
      display: flex;
      align-items: center;
    }
    .faction-card-name {
      font-size: 1rem;
      font-weight: 700;
    }
    .faction-card-chevron {
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
    }
    .faction-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .faction-card-resource {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(147,51,234,0.2);
      color: var(--accent);
    }
    .faction-card-slots {

      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 16px;
      background: var(--bg);

      font-size: 0.65rem;

    .faction-slot-badge.elite { background: rgba(168,85,247,0.15); color: #a855f7; }
    .faction-slot-badge.core { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .faction-slot-badge.support { background: rgba(34,197,94,0.15); color: #22c55e; }
    .faction-card-abilities {
      padding: 12px 16px;
    }

    .glossary-search {
      margin-bottom: 16px;
    }

      border-radius: 8px;
      background: var(--panel);
      color: var(--text);

      outline: none;
      transition: border-color 0.15s;

    }
    .glossary-search-input::placeholder {
      color: var(--muted);
    }

      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      padding: 8px 4px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);

    .glossary-entry {

    }
    .glossary-entry.tag-entry {
      border-left-color: var(--accent);

       MODALS
    ======================================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: grid;
      place-items: center;
      z-index: 200;
      padding: 20px;
      animation: fadeIn 0.15s;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 380px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      animation: slideUp 0.2s;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

      font-weight: 700;
      font-size: 1.1rem;
    }
    .modal-type {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }

      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: grid;
      place-items: center;

    }

      color: var(--muted);
      margin-top: 4px;
    }

    .check-overlay {
      position: fixed;

      left: 50%;
      transform: translate(-50%, -50%);

      height: 100px;
      background: var(--success);
      border-radius: 50%;

      place-items: center;

      40% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      60% { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }

    // ============================================================================

    function highlightKeywords(text) {
      const patterns = Object.keys(KEYWORDS).map(k => ({ keyword: k, pattern: new RegExp('\\b' + k.replace(/[()]/g, '\\$&') + '(?:\\s*\\([^)]+\\))?', 'gi') }));
      let result = text;
      patterns.forEach(({ keyword, pattern }) => {
        result = result.replace(pattern, (match) => '<span class="keyword" onclick="showKeyword(\'' + keyword + '\')">' + match + '</span>');
      });
      return result;
    }

    function getTotals() {
      const minerals = state.armyUnits.reduce((sum, u) => {
        const upgCost = (u.selectedUpgrades || []).reduce((us, upg) => {
          const cost = upg.cost;
          if (typeof cost === 'string' && cost.includes('/')) {
            const [single] = cost.split('/').map(Number);
            return us + single;
          }
          return us + (parseInt(cost) || 0);
        }, 0);
        return sum + u.cost + upgCost;
      }, 0);
      const gas = state.armyTactical.reduce((sum, t) => sum + t.cost, 0);
      const supply = state.armyUnits.reduce((sum, u) => sum + u.tier.supply, 0);
      const scale = state.selectedScale;
      return {
        minerals,
        gas,
        supply,
        mineralsLeft: scale.id === 'grand' ? 'inf' : scale.minerals - minerals,
        gasLeft: scale.id === 'grand' ? 'inf' : scale.gas - gas,
        mineralsOver: scale.id !== 'grand' && minerals > scale.minerals,
        gasOver: scale.id !== 'grand' && gas > scale.gas
      };
    }

    function getSlots() {
      const baseSlots = state.selectedFaction?.slots || {};
      const tacticalSlots = state.armyTactical.reduce((acc, t) => {
        Object.entries(t.slots || {}).forEach(([slot, count]) => {
          acc[slot] = (acc[slot] || 0) + count;
        });
        return acc;
      }, {});
      // Start with base slots from faction, then add tactical slots
      const totalSlots = { ...baseSlots };
      Object.entries(tacticalSlots).forEach(([slot, count]) => {
        totalSlots[slot] = (totalSlots[slot] || 0) + count;
      });
      // Calculate used slots
      const used = { hero: 0, elite: 0, core: 0, support: 0 };
      state.armyUnits.forEach(u => {
        const role = u.unit.role.toLowerCase();
        if (used[role] !== undefined) used[role] += u.tier.supply || 1;
      });
      return { total: totalSlots, used };
    }

    function save() {
      try {
        const toSave = {
          units: state.armyUnits.map(entry => ({
            unitId: entry.unit.id,
            tier: entry.tier,
            cost: entry.cost,
            selectedUpgrades: entry.selectedUpgrades || []
          })),
          tactical: state.armyTactical.map(t => t.id),
          factionId: state.selectedFaction?.id,
          scaleId: state.selectedScale?.id
        };
        localStorage.setItem('sc-tmg-zerg-v4', JSON.stringify(toSave));
      } catch (e) { console.error(e); }
    }

    function load() {
      try {
        const saved = localStorage.getItem('sc-tmg-zerg-v4');
        if (saved) {
          const { units, tactical, factionId, scaleId } = JSON.parse(saved);
          const rehydratedUnits = (units || []).map(entry => {
            const unit = ZERG_UNITS.find(u => u.id === entry.unitId);
            if (!unit) return null;
            return { unit, tier: entry.tier, cost: entry.cost, selectedUpgrades: entry.selectedUpgrades || [] };
          }).filter(Boolean);
          const rehydratedTactical = (tactical || []).map(id => ZERG_TACTICAL_CARDS.find(t => t.id === id)).filter(Boolean);
          state.armyUnits = rehydratedUnits;
          state.armyTactical = rehydratedTactical;
          const faction = ZERG_FACTION_CARDS.find(f => f.id === factionId);
          if (faction) state.selectedFaction = faction;
          const scale = ENGAGEMENT_SCALES.find(s => s.id === scaleId);
          if (scale) state.selectedScale = scale;
        }
      } catch (e) { console.error(e); }
    }

      const entryId = Date.now();
      state.armyUnits.push({ unit, tier, cost: tier.cost, selectedUpgrades: [], entryId });
      state.justAddedId = entryId;
      state.tierPicker = null;
      
      // Show check animation
      const checkEl = document.createElement('div');
      checkEl.className = 'check-overlay';
      checkEl.textContent = String.fromCharCode(10003);
      document.body.appendChild(checkEl);
      setTimeout(() => checkEl.remove(), 600);
      
      save();
      render();
      setTimeout(() => { state.justAddedId = null; render(); }, 350);
    }

    function toggleUpgrade(entryId, upgrade) {
      state.armyUnits = state.armyUnits.map(entry => {
        if (entry.entryId !== entryId) return entry;
        const isSelected = (entry.selectedUpgrades || []).some(u => u.name === upgrade.name);
        return {
          ...entry,
          selectedUpgrades: isSelected
            ? entry.selectedUpgrades.filter(u => u.name !== upgrade.name)
            : [...(entry.selectedUpgrades || []), upgrade]
        };
      });
      save();
      render();
    }

    function addTactical(cardId) {
      const card = ZERG_TACTICAL_CARDS.find(t => t.id === cardId);
      if (!card) return;
      if (card.unique && state.armyTactical.some(t => t.id === cardId)) return;
      state.armyTactical.push(card);
      save();
      render();

    function doExport(mode) {
      const lines = [];
      const totals = getTotals();
      const slots = getSlots();
      const divider = '='.repeat(50);
      const thinDivider = '-'.repeat(50);

      lines.push(divider);
      lines.push('  ' + (state.selectedFaction?.name?.toUpperCase() || 'ZERG') + ' - ' + state.selectedScale.name);
      lines.push(divider);
      lines.push('');

      // Faction
      lines.push('FACTION: ' + state.selectedFaction?.name + ' (' + state.selectedFaction?.resource + ')');
      const slotStr = Object.entries(state.selectedFaction?.slots || {}).map(([s, c]) => s.charAt(0).toUpperCase() + c).join(' / ');
      lines.push('  Slots: ' + slotStr);
      lines.push('');

      // Tactical
      if (state.armyTactical.length > 0) {
        lines.push('TACTICAL CARDS');
        lines.push(thinDivider);
        state.armyTactical.forEach(t => {
          lines.push(t.name + (t.unique ? ' [U]' : '') + ' - ' + t.cost + ' Gas');
        });
        lines.push('');
      }

      // Units
      if (state.armyUnits.length > 0) {
        lines.push('UNITS');
        lines.push(thinDivider);
        ['Hero', 'Elite', 'Core', 'Support', 'Other'].forEach(role => {
          const unitsInRole = state.armyUnits.filter(e => e.unit.role === role);
          if (unitsInRole.length === 0) return;
          lines.push('> ' + role.toUpperCase());
          unitsInRole.forEach(entry => {
            const upgCost = (entry.selectedUpgrades || []).reduce((sum, u) => sum + (parseInt(String(u.cost).split('/')[0]) || 0), 0);
            const total = entry.cost + upgCost;
            lines.push('  ' + entry.unit.name + ' x' + entry.tier.models + ' - ' + total + ' pts (Supply ' + entry.tier.supply + ')');
            (entry.selectedUpgrades || []).forEach(upg => {
              lines.push('    + ' + upg.name + ' (+' + upg.cost + ')');
            });
          });
        });
        lines.push('');
      }

      lines.push(divider);
      lines.push('  ' + totals.minerals + '/' + state.selectedScale.minerals + ' Mins - ' + totals.gas + '/' + state.selectedScale.gas + ' Gas - Supply ' + totals.supply);
      lines.push(divider);

      state.exportText = lines.join('\n');
      state.showExportChoice = false;
      render();
    }

    function closeExportText() {
      state.exportText = null;
      render();
    }

    // ============================================================================
    // RENDER
    // ============================================================================
    function render() {
      const totals = getTotals();
      const slots = getSlots();
      const app = document.getElementById('app');
      const tabBar = document.getElementById('tabBar');

      // Group army units by role
      const armyByRole = {};

        armyByRole[role] = state.armyUnits.filter(u => u.unit.role === role);

      // Group library units by role

      const unitIdsInArmy = state.armyUnits.map(u => u.unit.id);
      const tacticalIdsInArmy = state.armyTactical.map(t => t.id);

      let html = '';

      // Sticky Header - always compact style
      html += '<div class="sticky-header" id="stickyHeader">';
      
      // Resources
      html += '<div class="resource-stats">';
      html += '<div class="resource-stat"><div class="resource-stat-label">Minerals</div><div class="resource-stat-value minerals ' + (totals.mineralsOver ? 'over' : '') + '">' + (totals.mineralsLeft === 'inf' ? '&#8734;' : totals.mineralsLeft) + '</div></div>';
      html += '<div class="resource-stat"><div class="resource-stat-label">Gas</div><div class="resource-stat-value gas ' + (totals.gasOver ? 'over' : '') + '">' + (totals.gasLeft === 'inf' ? '&#8734;' : totals.gasLeft) + '</div></div>';

      html += '</div>';

      // Slots row
      html += '<div class="slots-compact">';
      ['hero', 'elite', 'core', 'support'].forEach(slot => {
        const limit = slots.total[slot] || 0;
        const used = slots.used[slot] || 0;
        if (limit === 0 && used === 0) return;
        const isOver = used > limit;
        html += '<div class="slot-item"><span class="slot-dot ' + slot + '"></span><span class="slot-label">' + slot.charAt(0).toUpperCase() + '</span><span class="slot-value ' + (isOver ? 'over' : 'ok') + '">' + used + '/' + limit + '</span></div>';
      });
      html += '</div>';
      html += '</div>'; // end sticky header

      // ========== ARMY TAB ==========
      html += '<div class="tab-content ' + (state.activeTab === 'army' ? 'active' : '') + '">';
      html += '<div class="tab-header"><div class="tab-title">Your Army (' + state.armyUnits.length + ')</div></div>';

      // Battle size selector
      html += '<div style="margin-bottom: 16px;">';
      html += '<div class="battle-size-row"><span class="battle-size-label">Battle Size</span><div class="battle-size-options">';

        html += '<button class="battle-size-option ' + (state.selectedScale.id === s.id ? 'active' : '') + '" onclick="selectScale(\'' + s.id + '\')">' + s.name + '</button>';

      html += '</div></div></div>';

      // Slot badges
      html += '<div class="slots-row">';

        const used = slots.used[slot] || 0;

        const isOver = used > limit;

      // Faction card in Your Army section
      if (state.selectedFaction) {

        const isFactionExpanded = state.expandedArmyCards['faction'];
        html += '<div class="army-card ' + (isFactionExpanded ? 'open' : '') + '" style="border-left: 3px solid var(--accent); margin-bottom: 16px;">';

        html += '<div class="army-card-right"><span class="army-card-chevron">' + (isFactionExpanded ? '&#9662;' : '&#8250;') + '</span></div>';
        html += '</div>';
        if (isFactionExpanded) {
          html += '<div class="army-card-body">';
          // Faction slots summary
          html += '<div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;">';

            html += '<span class="faction-slot-badge ' + s + '">' + s.toUpperCase() + ' x' + c + '</span>';

          html += '</div>';

              html += '<div class="army-card ' + (entryId === state.justAddedId ? 'just-added' : '') + ' ' + (isExpanded ? 'open' : '') + '">';

                      if (w.keywords?.length > 0) {

                      }
                      html += '</div>';
                    });
                    html += '</div>';
                  }
                  html += '</div>';
                }

                // Abilities
                const allAbilities = [...(unit.abilities || []), ...Object.entries(unit.phaseAbilities || {}).flatMap(([phase, abs]) => abs.map(a => ({ ...a, phase })))];
                if (allAbilities.length > 0) {

                  if (state.openSections['army-abl-' + entryId]) {

                    allAbilities.forEach(a => {
                      html += '<div class="ability-block"><div class="ability-header"><div class="ability-title">' + a.name + '</div><div class="ability-meta">' + a.phase + ' - ' + a.type + '</div></div><div class="ability-body">' + highlightKeywords(a.description) + '</div></div>';

                    html += '</div>';
                  }
                  html += '</div>';
                }

                // Upgrades
                if (allUpgrades.length > 0) {
                  html += '<div class="section-block ' + (state.openSections['army-upg-' + entryId] ? 'open' : '') + '">';
                  html += '<div class="section-header" onclick="toggleSection(\'army-upg-' + entryId + '\')"><span class="section-title">Upgrades</span><span class="chevron">&#8250;</span></div>';

            html += '<div class="stat-chip"><span class="stat-abbr">AR</span><span class="stat-value">' + unit.stats.armour + '</span></div>';

            }
            html += '</div>';
          }
          html += '</div>';
        });
        html += '</div>';
      });
      html += '</div>'; // end Units tab

      // ========== TACTICAL TAB ==========
      html += '<div class="tab-content ' + (state.activeTab === 'tactical' ? 'active' : '') + '">';
      html += '<div class="tab-header"><div class="tab-title">Tactical Cards</div></div>';
      
      const tacticalCategories = [
        { id: 'economy', name: 'Infrastructure', desc: 'Buildings and army support cards' }
      ];
      
      const renderTacticalCard = (card) => {
        const isInArmy = tacticalIdsInArmy.includes(card.id);
        const isExpanded = state.expandedLibraryCards['tac-' + card.id];
        let cardHtml = '<div class="tactical-card ' + (isInArmy ? 'in-army' : '') + '">';
        cardHtml += '<div class="tactical-header" onclick="toggleLibraryCard(\'tac-' + card.id + '\')">';
        cardHtml += '<div class="tactical-title-row"><div class="tactical-name">' + card.name + (card.unique ? ' <span class="unique-badge">Unique</span>' : '') + '</div><div class="tactical-right"><span class="tactical-cost">' + card.cost + ' Gas</span><button class="btn-add" onclick="event.stopPropagation(); addTactical(\'' + card.id + '\')">+</button></div></div>';
        if (card.summary) cardHtml += '<div class="tactical-summary">' + card.summary + '</div>';
        cardHtml += '<div class="tactical-info">';
        if (card.resource) cardHtml += '<span class="tactical-pill">' + card.resource + '</span>';
        Object.entries(card.slots || {}).forEach(([s, c]) => {
          cardHtml += '<span class="tactical-pill">' + s.toUpperCase() + ' +' + c + '</span>';
        });
        cardHtml += '</div>';
        cardHtml += '</div>';
        if (isExpanded) {
          cardHtml += '<div class="tactical-body">';
          (card.abilities || []).forEach(a => {
            cardHtml += '<div class="ability-block"><div class="ability-header"><div class="ability-title">' + a.name + '</div><div class="ability-meta">' + a.phase + ' - ' + a.type + '</div></div><div class="ability-body">' + highlightKeywords(a.description) + '</div></div>';
          });
          cardHtml += '</div>';
        }
        cardHtml += '</div>';
        return cardHtml;
      };
      
      tacticalCategories.forEach(cat => {
        const cardsInCat = ZERG_TACTICAL_CARDS;
        if (cardsInCat.length > 0) {
          html += '<div class="tactical-category-header"><span class="tactical-category-name">' + cat.name + '</span><span class="tactical-category-desc">' + cat.desc + '</span></div>';
          cardsInCat.forEach(card => {
            html += renderTacticalCard(card);
          });
        }
      });
      
      html += '</div>'; // end Tactical tab

      // ========== FACTIONS TAB ==========
      html += '<div class="tab-content ' + (state.activeTab === 'factions' ? 'active' : '') + '">';
      html += '<div class="tab-header"><div class="tab-title">Faction Cards</div></div>';
      
      ZERG_FACTION_CARDS.forEach(faction => {
        const isSelected = state.selectedFaction?.id === faction.id;
        const isExpanded = state.expandedLibraryCards['faction-' + faction.id];
        html += '<div class="faction-card ' + (isSelected ? 'selected' : '') + '">';
        html += '<div class="faction-card-header">';
        html += '<button class="faction-radio ' + (isSelected ? 'selected' : '') + '" onclick="event.stopPropagation(); selectFaction(\'' + faction.id + '\')">' + (isSelected ? '&#10003;' : '') + '</button>';
        html += '<div class="faction-card-main" onclick="toggleLibraryCard(\'faction-' + faction.id + '\')">';
        html += '<div class="faction-card-top"><span class="faction-card-name">' + faction.name + '</span></div>';
        html += '<div class="faction-card-meta"><span class="faction-card-resource">' + faction.resource + '</span></div>';
        html += '</div>';
        html += '<span class="faction-card-chevron" onclick="toggleLibraryCard(\'faction-' + faction.id + '\')">' + (isExpanded ? '&#9662;' : '&#8250;') + '</span>';
        html += '</div>';
        html += '<div class="faction-card-slots">';
        Object.entries(faction.slots || {}).forEach(([s, c]) => {
          html += '<span class="faction-slot-badge ' + s + '">' + s.toUpperCase() + ' x' + c + '</span>';
        });
        html += '</div>';
        if (isExpanded) {
          html += '<div class="faction-card-abilities">';
          (faction.abilities || []).forEach(a => {
            html += '<div class="ability-block"><div class="ability-header"><div class="ability-title">' + a.name + '</div><div class="ability-meta">' + a.phase + ' - ' + a.type + '</div></div><div class="ability-body">' + highlightKeywords(a.description) + '</div></div>';
          });
          html += '</div>';
        }
        html += '</div>';
      });
      html += '</div>'; // end Factions tab

      // ========== GLOSSARY TAB ==========
      html += '<div class="tab-content ' + (state.activeTab === 'glossary' ? 'active' : '') + '">';
      html += '<div class="tab-header"><div class="tab-title">Glossary</div></div>';
      
      // Search input
      html += '<div class="glossary-search"><input type="text" class="glossary-search-input" placeholder="Search keywords..." value="' + state.glossarySearch + '" oninput="updateGlossarySearch(this.value)"></div>';
      
      const searchTerm = state.glossarySearch.toLowerCase();
      
      // Filter function
      const matchesSearch = (name, desc) => {
        if (!searchTerm) return true;
        return name.toLowerCase().includes(searchTerm) || desc.toLowerCase().includes(searchTerm);
      };
      
      // Surge Tags
      const filteredSurgeTags = SURGE_TAGS.filter(tag => matchesSearch(tag, TAGS[tag].description));
      if (filteredSurgeTags.length > 0) {
        html += '<div class="glossary-section-header">Surge Tags</div>';
        filteredSurgeTags.forEach(tag => {
          const data = TAGS[tag];
          html += '<div class="ability-block glossary-entry tag-entry"><div class="ability-header"><div class="ability-title">' + tag + '</div><div class="ability-meta">' + data.type + '</div></div><div class="ability-body">' + data.description + '</div></div>';
        });
      }
      
      // Type Tags
      const filteredTypeTags = TYPE_TAGS.filter(tag => matchesSearch(tag, TAGS[tag].description));
      if (filteredTypeTags.length > 0) {
        html += '<div class="glossary-section-header" style="margin-top: 16px;">Type Tags</div>';
        filteredTypeTags.forEach(tag => {
          const data = TAGS[tag];
          html += '<div class="ability-block glossary-entry tag-entry"><div class="ability-header"><div class="ability-title">' + tag + '</div><div class="ability-meta">' + data.type + '</div></div><div class="ability-body">' + data.description + '</div></div>';
        });
      }
      
      // Special Tags
      const filteredSpecialTags = Object.entries(TAGS).filter(([t]) => !SURGE_TAGS.includes(t) && !TYPE_TAGS.includes(t)).filter(([tag, data]) => matchesSearch(tag, data.description));
      if (filteredSpecialTags.length > 0) {
        html += '<div class="glossary-section-header" style="margin-top: 16px;">Special Tags</div>';
        filteredSpecialTags.forEach(([tag, data]) => {
          html += '<div class="ability-block glossary-entry tag-entry"><div class="ability-header"><div class="ability-title">' + tag + '</div><div class="ability-meta">' + data.type + '</div></div><div class="ability-body">' + data.description + '</div></div>';
        });
      }
      
      // Keywords
      const filteredKeywords = Object.entries(KEYWORDS).filter(([kw, data]) => matchesSearch(kw, data.description)).sort(([a], [b]) => a.localeCompare(b));
      if (filteredKeywords.length > 0) {
        html += '<div class="glossary-section-header" style="margin-top: 16px;">Keywords</div>';
        filteredKeywords.forEach(([keyword, data]) => {
          html += '<div class="ability-block glossary-entry"><div class="ability-header"><div class="ability-title">' + keyword + '</div><div class="ability-meta">' + data.type + '</div></div><div class="ability-body">' + data.description + '</div></div>';
        });
      }
      
      // No results message
      if (searchTerm && filteredSurgeTags.length === 0 && filteredTypeTags.length === 0 && filteredSpecialTags.length === 0 && filteredKeywords.length === 0) {
        html += '<div class="empty-state">No results for "' + state.glossarySearch + '"</div>';
      }
      
      html += '</div>'; // end Glossary tab

      // Modals
      if (state.keywordModal) {
        const kw = KEYWORDS[state.keywordModal] || TAGS[state.keywordModal];
        if (kw) {
          html += '<div class="modal-overlay" onclick="closeKeywordModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><div><div class="modal-title">' + state.keywordModal + '</div><div class="modal-type">' + kw.type + '</div></div><button class="modal-close" onclick="closeKeywordModal()">&#215;</button></div><div class="modal-body">' + kw.description + '</div></div></div>';
        }
      }

      if (state.tierPicker) {
        const unit = state.tierPicker;
        html += '<div class="modal-overlay" onclick="closeTierPicker()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><div><div class="modal-title">' + unit.name + '</div><div class="modal-type">Select tier</div></div><button class="modal-close" onclick="closeTierPicker()">&#215;</button></div><div class="modal-body">';
        unit.tiers.forEach(t => {
          if (t.cost === null) return;
          html += '<div class="tier-option" onclick="selectTier(' + JSON.stringify(t).replace(/"/g, '&quot;') + ')"><div class="tier-option-main"><span class="tier-option-models">' + t.models + ' models</span><span class="tier-option-cost">' + t.cost + ' pts</span></div><div class="tier-option-supply">Supply: ' + t.supply + '</div></div>';
        });
        html += '</div></div></div>';
      }

      if (state.showExportChoice) {
        html += '<div class="modal-overlay" onclick="closeExportChoice()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><div><div class="modal-title">Export Army</div><div class="modal-type">Choose format</div></div><button class="modal-close" onclick="closeExportChoice()">&#215;</button></div><div class="modal-body">';
        html += '<button class="export-choice-btn" onclick="doExport(\'quick\')"><div class="export-choice-title">Quick Reference</div><div class="export-choice-desc">Compact cheat sheet for experienced players</div></button>';
        html += '<button class="export-choice-btn" onclick="doExport(\'full\')"><div class="export-choice-title">Full Guide</div><div class="export-choice-desc">Complete guide with explanations</div></button>';
        html += '</div></div></div>';
      }

      if (state.showClearConfirm) {
        html += '<div class="modal-overlay" onclick="closeClearConfirm()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><div><div class="modal-title">Clear Army?</div><div class="modal-type">This will remove all units and tactical cards</div></div><button class="modal-close" onclick="closeClearConfirm()">&#215;</button></div><div class="modal-body" style="display: flex; gap: 8px;"><button class="army-btn" style="flex: 1;" onclick="closeClearConfirm()">Cancel</button><button class="btn-remove" style="flex: 1; margin-top: 0;" onclick="clearArmy()">Clear Army</button></div></div></div>';
      }

      if (state.exportText) {
        html += '<div class="modal-overlay" onclick="closeExportText()"><div class="modal" onclick="event.stopPropagation()" style="max-width: 420px;"><div class="modal-header"><div><div class="modal-title">Export Army</div><div class="modal-type">Copy the text below</div></div><button class="modal-close" onclick="closeExportText()">&#215;</button></div><div class="modal-body"><textarea readonly style="width: 100%; height: 200px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-size: 0.85rem; font-family: monospace; resize: none;" onfocus="this.select()">' + state.exportText + '</textarea><button class="army-btn" style="width: 100%; margin-top: 12px;" onclick="closeExportText()">Done</button></div></div></div>';
      }

      app.innerHTML = html;

      // Tab bar with 5 tabs
      let tabHtml = '';
      [
        { id: 'army', icon: '&#9876;', label: 'Army' },
        { id: 'units', icon: '&#9814;', label: 'Units' },
        { id: 'tactical', icon: '&#9733;', label: 'Tactical' },
        { id: 'factions', icon: '&#9813;', label: 'Factions' },
        { id: 'glossary', icon: '&#9776;', label: 'Glossary' },
      ].forEach(tab => {
        tabHtml += '<button class="tab-btn ' + (state.activeTab === tab.id ? 'active' : '') + '" onclick="setTab(\'' + tab.id + '\')"><span class="tab-icon">' + tab.icon + '</span>' + tab.label + '</button>';
      });
      tabBar.innerHTML = tabHtml;
    }

    // ============================================================================
    // SCROLL HANDLING - removed, no longer needed
    // ============================================================================

    // ============================================================================
    // INIT
    // ============================================================================
    load();
    render();
  </script>

  <button class="app-menu-btn" id="appMenuBtn" aria-label="Open navigation menu" type="button"><span class="bars"></span></button>
  <div class="app-menu-overlay" id="appMenuOverlay"></div>
  <aside class="app-menu-panel" id="appMenuPanel" aria-hidden="true">
    <div class="app-menu-head">
      <div class="app-menu-title">Navigation</div>
      <button class="app-menu-close" id="appMenuClose" type="button" aria-label="Close navigation menu">&times;</button>
    </div>
    <nav class="app-menu-links">
      <a class="app-menu-link home" data-page="index.html" href="index.html"><span class="dot"></span><span>Home</span></a>
      <a class="app-menu-link zerg" data-page="zerg.html" href="zerg.html"><span class="dot"></span><span>Zerg</span></a>
      <a class="app-menu-link protoss" data-page="protoss.html" href="protoss.html"><span class="dot"></span><span>Protoss</span></a>
      <a class="app-menu-link terran" data-page="terran.html" href="terran.html"><span class="dot"></span><span>Terran</span></a>
      <a class="app-menu-link missions" data-page="missions.html" href="missions.html"><span class="dot"></span><span>Missions</span></a>
      <a class="app-menu-link rules" data-page="rules.html" href="rules.html"><span class="dot"></span><span>Rules</span></a>
    </nav>
    <div class="app-menu-spacer"></div>
    <div class="app-menu-note">Jump between pages without losing your place.</div>
  </aside>
  <script>
    (function(){
      const btn = document.getElementById('appMenuBtn');
      const overlay = document.getElementById('appMenuOverlay');
      const panel = document.getElementById('appMenuPanel');
      const closeBtn = document.getElementById('appMenuClose');
      if(!btn || !overlay || !panel || !closeBtn) return;
      const setOpen = (open) => {
        overlay.classList.toggle('open', open);
        panel.classList.toggle('open', open);
        panel.setAttribute('aria-hidden', open ? 'false' : 'true');
        document.body.style.overflow = open ? 'hidden' : '';
      };
      btn.addEventListener('click', () => setOpen(true));
      closeBtn.addEventListener('click', () => setOpen(false));
      overlay.addEventListener('click', () => setOpen(false));
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') setOpen(false); });
      const current = (location.pathname.split('/').pop() || 'terran.html').toLowerCase();
      document.querySelectorAll('.app-menu-link').forEach(link => {
        const page = (link.getAttribute('data-page') || '').toLowerCase();
        if (page === current) link.classList.add('active');
      });
    })();
  </script>

</body>
</html>
