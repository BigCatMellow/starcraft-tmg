// HELPERS
// ============================================================================
const highlightKeywords = (text, onClick) => {
  const patterns = Object.keys(KEYWORDS).map(k => ({ keyword: k, pattern: new RegExp(`\\b${k.replace(/[()]/g, '\\$&')}(?:\\s*\\([^)]+\\))?`, 'gi') }));
  let result = text;
  const matches = [];
  patterns.forEach(({ keyword, pattern }) => {
    let m; while ((m = pattern.exec(text)) !== null) matches.push({ start: m.index, end: m.index + m[0].length, text: m[0], keyword });
  });
  matches.sort((a, b) => a.start - b.start);
  const filtered = []; let lastEnd = -1;
  for (const r of matches) { if (r.start >= lastEnd) { filtered.push(r); lastEnd = r.end; } }
  if (filtered.length === 0) return text;
  const parts = []; let pos = 0;
  filtered.forEach(r => {
    if (r.start > pos) parts.push(text.slice(pos, r.start));
    parts.push(<span key={r.start} className="keyword" onClick={(e) => { e.stopPropagation(); onClick(r.keyword); }}>{r.text}</span>);
    pos = r.end;
  });
  if (pos < text.length) parts.push(text.slice(pos));
  return parts;
};

const Collapsible = ({ children, header, defaultOpen = false, className = '' }) => {

const WeaponCard = ({ weapon, onKeywordClick, modifications }) => {

  const surgeTags = unit.tags.filter(t => SURGE_TAGS.includes(t));

            {surgeTags.length > 0 && typeTags.length > 0 && <span className="tag-separator">·</span>}

// ============================================================================
// MAIN APP
// ============================================================================
function App() {
  const [selectedFaction, setSelectedFaction] = useState(PROTOSS_FACTION_CARDS[0]);
  const [selectedScale, setSelectedScale] = useState(ENGAGEMENT_SCALES[1]);
  const [armyUnits, setArmyUnits] = useState([]);
  const [armyTactical, setArmyTactical] = useState([]);
  const [keywordModal, setKeywordModal] = useState(null);
  const [tierPicker, setTierPicker] = useState(null);
  const [headerOpen, setHeaderOpen] = useState(true);

  // Calculate totals
  const minerals = armyUnits.reduce((sum, u) => sum + u.cost + u.selectedUpgrades.reduce((us, upg) => { const cost = upg.cost; if (typeof cost === 'string' && cost.includes('/')) { const [single] = cost.split('/').map(Number); return us + single; } return us + (parseInt(cost) || 0); }, 0), 0);
  const gas = armyTactical.reduce((sum, t) => sum + t.cost, 0);
  const supply = armyUnits.reduce((sum, u) => sum + u.tier.supply, 0);
  
  const mineralsRemaining = selectedScale.id === 'grand' ? '∞' : selectedScale.minerals - minerals;
  const gasRemaining = selectedScale.id === 'grand' ? '∞' : selectedScale.gas - gas;
  const mineralsOver = typeof mineralsRemaining === 'number' && mineralsRemaining < 0;
  const gasOver = typeof gasRemaining === 'number' && gasRemaining < 0;

  // Calculate slots from faction + tactical
  const baseSlots = selectedFaction?.slots || {};
  const tacticalSlots = armyTactical.reduce((acc, t) => {
    Object.entries(t.slots).forEach(([slot, count]) => {
      acc[slot] = (acc[slot] || 0) + count;
    });
    return acc;
  }, {});
  const totalSlots = { ...baseSlots };
  Object.entries(tacticalSlots).forEach(([slot, count]) => {
    totalSlots[slot] = (totalSlots[slot] || 0) + count;
  });
  
  const slotsUsed = { hero: 0, elite: 0, core: 0, support: 0 };
  armyUnits.forEach(u => {
    const role = u.unit.role.toLowerCase();
    if (slotsUsed[role] !== undefined) slotsUsed[role] += u.tier.supply || 1;
  });

  // Persistence
  useEffect(() => {
    try {
      const saved = localStorage.getItem('sc-tmg-protoss-v1');
      if (saved) {
        const { units, tactical, factionId, scaleId } = JSON.parse(saved);
        const rehydratedUnits = (units || []).map(entry => {
          const unit = PROTOSS_UNITS.find(u => u.id === entry.unitId);
          if (!unit) return null;
          return { unit, tier: entry.tier, cost: entry.cost, selectedUpgrades: entry.selectedUpgrades || [] };
        }).filter(Boolean);
        const rehydratedTactical = (tactical || []).map(id => PROTOSS_TACTICAL_CARDS.find(t => t.id === id)).filter(Boolean);
        setArmyUnits(rehydratedUnits);
        setArmyTactical(rehydratedTactical);
        const faction = PROTOSS_FACTION_CARDS.find(f => f.id === factionId);
        if (faction) setSelectedFaction(faction);
        const scale = ENGAGEMENT_SCALES.find(s => s.id === scaleId);
        if (scale) setSelectedScale(scale);
      }
    } catch (e) { console.error(e); }
  }, []);

  useEffect(() => {
    const toSave = {
      units: armyUnits.map(entry => ({ unitId: entry.unit.id, tier: entry.tier, cost: entry.cost, selectedUpgrades: entry.selectedUpgrades })),
      tactical: armyTactical.map(t => t.id),
      factionId: selectedFaction?.id,
      scaleId: selectedScale?.id
    };
    localStorage.setItem('sc-tmg-protoss-v1', JSON.stringify(toSave));
  }, [armyUnits, armyTactical, selectedFaction, selectedScale]);

  const handleAddUnit = useCallback((unit) => setTierPicker(unit), []);
  const handleSelectTier = useCallback((unit, tier) => { setArmyUnits(prev => [...prev, { unit, tier, cost: tier.cost, selectedUpgrades: [] }]); setTierPicker(null); }, []);
  const handleRemoveUnit = useCallback((idx) => setArmyUnits(prev => prev.filter((_, i) => i !== idx)), []);
  const handleToggleUpgrade = useCallback((unitIdx, upgrade) => { setArmyUnits(prev => prev.map((entry, i) => { if (i !== unitIdx) return entry; const isSelected = entry.selectedUpgrades.some(u => u.name === upgrade.name); return { ...entry, selectedUpgrades: isSelected ? entry.selectedUpgrades.filter(u => u.name !== upgrade.name) : [...entry.selectedUpgrades, upgrade] }; })); }, []);
  
  const handleAddTactical = useCallback((card) => {
    if (card.unique && armyTactical.some(t => t.id === card.id)) return;
    setArmyTactical(prev => [...prev, card]);
  }, [armyTactical]);
  const handleRemoveTactical = useCallback((idx) => setArmyTactical(prev => prev.filter((_, i) => i !== idx)), []);
  
  const [showClearConfirm, setShowClearConfirm] = useState(false);
  const [exportText, setExportText] = useState(null);
  const [showExportChoice, setShowExportChoice] = useState(false);
  
  const handleClearArmy = useCallback(() => { setArmyUnits([]); setArmyTactical([]); setShowClearConfirm(false); }, []);
  
  // Generate Quick Reference export
  const generateQuickExport = useCallback(() => {
    const lines = [];
    const divider = '═'.repeat(50);
    const thinDivider = '─'.repeat(50);
    
    // Header
    lines.push(divider);
    lines.push(`  ${selectedFaction?.name?.toUpperCase() || 'PROTOSS'} · ${selectedScale.name}`);
    lines.push(divider);
    lines.push('');
    
    // Warnings
    const warnings = [];
    if (selectedScale.id !== 'grand') {
      if (minerals > selectedScale.minerals) warnings.push(`⚠ OVER MINERALS: ${minerals}/${selectedScale.minerals}`);
      if (gas > selectedScale.gas) warnings.push(`⚠ OVER GAS: ${gas}/${selectedScale.gas}`);
    }
    if (warnings.length > 0) {
      lines.push(...warnings, '');
    }
    
    // Faction Card
    lines.push(`FACTION: ${selectedFaction?.name} .............. ${selectedFaction?.resource}`);
    const slotStr = Object.entries(selectedFaction?.slots || {}).map(([s, c]) => `${s.charAt(0).toUpperCase()}${c}`).join(' · ');
    lines.push(`  Slots: ${slotStr}`);
    lines.push('');
    
    // Tactical Cards
    if (armyTactical.length > 0) {
      const totalGas = armyTactical.reduce((sum, t) => sum + (t.cost || 0), 0);
      lines.push(`TACTICAL CARDS ${'.'.repeat(30)} ${totalGas} Gas`);
      lines.push(thinDivider);
      armyTactical.forEach(t => {
        const slotInfo = Object.entries(t.slots || {}).map(([s, c]) => `${s.charAt(0).toUpperCase()}+${c}`).join(' ');
        lines.push(`${t.name}${t.unique ? ' [U]' : ''} ${'.'.repeat(Math.max(3, 38 - t.name.length))} ${t.cost} Gas`);
        lines.push(`  ${t.resource || ''} ${slotInfo}`);
        t.abilities?.forEach(a => {
          const costStr = a.cost ? `/${a.cost}` : '';
          lines.push(`  ◆ ${a.name} (${a.phase.replace(' Phase', '')}·${a.type}${costStr})`);
        });
      });
      lines.push('');
    }
    
    // Units by Role
    if (armyUnits.length > 0) {
      lines.push(`UNITS ${'.'.repeat(38)} ${minerals} Mins`);
      lines.push(thinDivider);
      
      ['Hero', 'Elite', 'Core', 'Support', 'Other'].forEach(role => {
        const unitsInRole = armyUnits.filter(e => e.unit.role === role);
        if (unitsInRole.length === 0) return;
        
        lines.push(`▸ ${role.toUpperCase()}`);
        unitsInRole.forEach(entry => {
          const { unit, tier, selectedUpgrades } = entry;
          const upgCost = selectedUpgrades.reduce((sum, u) => sum + (parseInt(String(u.cost).split('/')[0]) || 0), 0);
          const unitTotal = entry.cost + upgCost;
          const modelStr = tier.models !== '-' ? ` ×${tier.models}` : '';
          
          lines.push(`  ${unit.name}${modelStr}${unit.unique ? ' [U]' : ''} ${'.'.repeat(Math.max(3, 32 - unit.name.length - modelStr.length))} ${unitTotal} pts`);
          
          // Compact stats
          const s = unit.stats;
          lines.push(`    ${s.shield ? 'SH'+s.shield+' · ' : ''}SPD ${s.speed} · EVA ${s.evade || '—'} · ARM ${s.armour} · HP ${s.hp}`);
          
          // Weapons - compact
          unit.weapons?.forEach(w => {
            const surgeStr = w.surge && w.surge !== '—' ? ` Surge:${w.surge}→${w.sDie}` : '';
            lines.push(`    • ${w.name}: ${w.range === 'E' ? 'Melee' : w.range+'"'} RoA${w.roa} ${w.hit} ${w.damage}dmg${surgeStr}`);
          });
          
          // Abilities - compact
          const allAbilities = [...(unit.abilities || []), ...Object.entries(unit.phaseAbilities || {}).flatMap(([phase, abs]) => abs.map(a => ({ ...a, phase })))];
          allAbilities.forEach(a => {
            const costStr = a.cost ? `/${a.cost}` : '';
            lines.push(`    ◆ ${a.name} (${a.phase.replace(' Phase', '')}·${a.type}${costStr})`);
          });
          
          // Selected upgrades
          selectedUpgrades.forEach(u => {
            lines.push(`    ✓ ${u.name} (+${u.cost}pts)`);
          });
        });
        lines.push('');
      });
    }
    
    // Footer
    lines.push(divider);
    if (selectedScale.id !== 'grand') {
      lines.push(`  ${minerals}/${selectedScale.minerals} Mins · ${gas}/${selectedScale.gas} Gas · Supply ${supply}`);
    } else {

            </div>
          ))}
          <div className="glossary-section-header" style={{ marginTop: 16 }}>Special Tags</div>
          {Object.entries(TAGS).filter(([tag]) => !SURGE_TAGS.includes(tag) && !TYPE_TAGS.includes(tag)).sort(([a], [b]) => a.localeCompare(b)).map(([tag, data]) => (
            <div key={tag} className="ability open glossary-entry tag-entry">
              <div className="ability-header-static"><div><div className="ability-title">{tag}</div><div className="ability-meta">{data.type}</div></div></div>
              <div className="ability-body">{data.description}</div>
            </div>
          ))}
          <div className="glossary-section-header" style={{ marginTop: 16 }}>Keywords</div>
          {Object.entries(KEYWORDS).sort(([a], [b]) => a.localeCompare(b)).map(([keyword, data]) => (
            <div key={keyword} className="ability open glossary-entry">
              <div className="ability-header-static"><div><div className="ability-title">{keyword}</div><div className="ability-meta">{data.type}</div></div></div>
              <div className="ability-body">{data.description}</div>
            </div>
          ))}
        </div>
      </Collapsible>

      {/* Modals */}
      {keywordModal && <KeywordModal keyword={keywordModal} onClose={() => setKeywordModal(null)} />}
      {tierPicker && <TierPickerModal unit={tierPicker} onSelect={handleSelectTier} onClose={() => setTierPicker(null)} />}
      {showExportChoice && (
        <div className="modal-overlay" onClick={() => setShowExportChoice(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div><div className="modal-title">Export Army</div><div className="modal-type">Choose export format</div></div>
              <button className="modal-close" onClick={() => setShowExportChoice(false)}>×</button>
            </div>
            <div className="modal-body" style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <button className="export-choice-btn" onClick={() => downloadTextExport('quick')}>
                <div className="export-choice-title">Export Quick Reference TXT</div>
                <div className="export-choice-desc">Save a compact cheat sheet to your device.</div>
              </button>
              <button className="export-choice-btn" onClick={() => downloadTextExport('full')}>
                <div className="export-choice-title">Export Full Reference TXT</div>
                <div className="export-choice-desc">Save the full readable army guide to your device.</div>
              </button>
              <button className="export-choice-btn" onClick={downloadJsonExport}>
                <div className="export-choice-title">Save JSON</div>
                <div className="export-choice-desc">Save structured army data for later loading.</div>
              </button>
            </div>
          </div>
        </div>
      )}
      {showClearConfirm && (
        <div className="modal-overlay" onClick={() => setShowClearConfirm(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div><div className="modal-title">Clear Army?</div><div className="modal-type">This will remove all units and tactical cards</div></div>
              <button className="modal-close" onClick={() => setShowClearConfirm(false)}>×</button>
            </div>
            <div className="modal-body" style={{ display: 'flex', gap: 8 }}>
              <button className="army-btn" style={{ flex: 1 }} onClick={() => setShowClearConfirm(false)}>Cancel</button>
              <button className="remove-unit" style={{ flex: 1, marginTop: 0 }} onClick={handleClearArmy}>Clear Army</button>
            </div>
          </div>
        </div>
      )}
      {exportText && (
        <div className="modal-overlay" onClick={() => setExportText(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 420 }}>
            <div className="modal-header">
              <div><div className="modal-title">Export Army</div><div className="modal-type">Copy the text below</div></div>
              <button className="modal-close" onClick={() => setExportText(null)}>×</button>
            </div>
            <div className="modal-body">
              <textarea 
                readOnly 
                value={exportText} 
                style={{ width: '100%', height: 200, background: 'var(--panel-2)', border: '1px solid var(--border)', borderRadius: 8, padding: 12, color: 'var(--text)', fontSize: '0.85rem', fontFamily: 'monospace', resize: 'none' }}
                onFocus={e => e.target.select()}
              />
              <button className="army-btn" style={{ width: '100%', marginTop: 12 }} onClick={() => setExportText(null)}>Done</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
  </script>
</body>
</html>
