const highlightKeywords = (text, onClick) => {
  const patterns = Object.keys(KEYWORDS).map(k => ({ keyword: k, pattern: new RegExp(`\\b${k.replace(/[()]/g, '\\$&')}(?:\\s*\\([^)]+\\))?`, 'gi') }));
  let result = text;
  const matches = [];
  patterns.forEach(({ keyword, pattern }) => {
    let m; while ((m = pattern.exec(text)) !== null) matches.push({ start: m.index, end: m.index + m[0].length, text: m[0], keyword });
  });
  matches.sort((a, b) => a.start - b.start);
  const filtered = []; let lastEnd = -1;
  for (const r of matches) { if (r.start >= lastEnd) { filtered.push(r); lastEnd = r.end; } }
  if (filtered.length === 0) return text;
  const parts = []; let pos = 0;
  filtered.forEach(r => {
    if (r.start > pos) parts.push(text.slice(pos, r.start));
    parts.push(<span key={r.start} className="keyword" onClick={(e) => { e.stopPropagation(); onClick(r.keyword); }}>{r.text}</span>);
    pos = r.end;
  });
  if (pos < text.length) parts.push(text.slice(pos));
  return parts;
};

          <div className="stats-grid" style={{ marginBottom: 12 }}><StatChip abbr="SH" value={unit.stats.shield} /><StatChip abbr="SP" value={unit.stats.speed} /><StatChip abbr="EV" value={unit.stats.evade} /><StatChip abbr="AR" value={unit.stats.armour} /><StatChip abbr="HP" value={unit.stats.hp} /><StatChip abbr="SZ" value={unit.stats.size} /></div>
          {unit.weapons.length > 0 && <Collapsible className="section-block" defaultOpen header={<div className="section-header"><span className="section-title">Weapons</span><span className="chevron">›</span></div>}><div className="section-body">{unit.weapons.map((w, i) => <WeaponCard key={i} weapon={w} modifications={weaponMods[w.name]} onKeywordClick={onKeywordClick} />)}</div></Collapsible>}
          {selectedUpgrades.length > 0 && <div className="section-block open"><div className="section-header-static"><span className="section-title">Selected Upgrades</span></div><div className="section-body">{selectedUpgrades.map((upg, i) => <Ability key={i} ability={{ name: upg.name, type: `${upg.phase} · ${upg.cost} pts · ${upg.type}`, description: upg.description }} onKeywordClick={onKeywordClick} />)}</div></div>}
          {allUpgrades.length > 0 && <Collapsible className="section-block" header={<div className="section-header"><span className="section-title">Available Upgrades</span><span className="chevron">›</span></div>}><div className="section-body">{allUpgrades.map((upg, i) => { const isSelected = selectedUpgrades.some(s => s.name === upg.name); return (
            <div key={i} className={`army-upgrade-card ${isSelected ? 'selected' : ''}`}>
              <div className="army-upgrade-header">
                <div>
                  <div className="army-upgrade-name">{upg.name}</div>
                  <div className="army-upgrade-meta">{upg.phase} · {upg.cost} pts · {upg.type}</div>
                </div>
                <button className={`upgrade-toggle ${isSelected ? 'active' : ''}`} onClick={() => onToggleUpgrade(upg)} />
              </div>
              <div className="army-upgrade-desc">{highlightKeywords(upg.description, onKeywordClick)}</div>
            </div>
          ); })}</div></Collapsible>}
          <button className="remove-unit" onClick={onRemove}>Remove Unit</button>
        </div>
      )}
    </div>
  );
};

// Army Tactical Card
const ArmyTacticalCard = ({ card, onRemove, onKeywordClick }) => {
  const [open, setOpen] = useState(false);
  return (
    <div className={`army-tactical-card ${open ? 'open' : ''}`}>
      <div className="army-tactical-header" onClick={() => setOpen(!open)}>
        <div>
          <div className="army-tactical-name">{card.name}</div>
          <div className="army-tactical-meta">{card.resource || 'Creep Card'} · {Object.entries(card.slots).map(([s, c]) => `${s.toUpperCase()} +${c}`).join(', ') || 'No slots'}</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span className="army-tactical-cost">{card.cost} Gas</span>
          <span className="chevron">›</span>
        </div>
      </div>
      {open && (
        <div className="army-tactical-body">
          {card.abilities.map((a, i) => <Ability key={i} ability={{ ...a, type: `${a.phase} · ${a.type}` }} onKeywordClick={onKeywordClick} />)}
          <button className="remove-unit" onClick={onRemove}>Remove Card</button>
        </div>
      )}
    </div>
  );
};

// ============================================================================
// MAIN APP
// ============================================================================
function App() {
  const [selectedFaction, setSelectedFaction] = useState(ZERG_FACTION_CARDS[0]);
  const [selectedScale, setSelectedScale] = useState(ENGAGEMENT_SCALES[1]);
  const [armyUnits, setArmyUnits] = useState([]);
  const [armyTactical, setArmyTactical] = useState([]);
  const [keywordModal, setKeywordModal] = useState(null);
  const [tierPicker, setTierPicker] = useState(null);
  const [headerOpen, setHeaderOpen] = useState(true);

  // Calculate totals
  const minerals = armyUnits.reduce((sum, u) => sum + u.cost + u.selectedUpgrades.reduce((us, upg) => { const cost = upg.cost; if (typeof cost === 'string' && cost.includes('/')) { const [single] = cost.split('/').map(Number); return us + single; } return us + (parseInt(cost) || 0); }, 0), 0);
  const gas = armyTactical.reduce((sum, t) => sum + t.cost, 0);
  const supply = armyUnits.reduce((sum, u) => sum + u.tier.supply, 0);
  
  const mineralsRemaining = selectedScale.id === 'grand' ? '∞' : selectedScale.minerals - minerals;
  const gasRemaining = selectedScale.id === 'grand' ? '∞' : selectedScale.gas - gas;
  const mineralsOver = typeof mineralsRemaining === 'number' && mineralsRemaining < 0;
  const gasOver = typeof gasRemaining === 'number' && gasRemaining < 0;

  // Calculate slots from faction + tactical
  const baseSlots = selectedFaction?.slots || {};
  const tacticalSlots = armyTactical.reduce((acc, t) => {
    Object.entries(t.slots).forEach(([slot, count]) => {
      acc[slot] = (acc[slot] || 0) + count;
    });
    return acc;
  }, {});
  const totalSlots = { ...baseSlots };
  Object.entries(tacticalSlots).forEach(([slot, count]) => {
    totalSlots[slot] = (totalSlots[slot] || 0) + count;
  });
  
  const slotsUsed = { hero: 0, elite: 0, core: 0, support: 0 };
  armyUnits.forEach(u => {
    const role = u.unit.role.toLowerCase();
    if (slotsUsed[role] !== undefined) slotsUsed[role] += u.tier.supply || 1;
  });

  // Persistence
  useEffect(() => {
    try {
      const saved = localStorage.getItem('sc-tmg-zerg-v3');
      if (saved) {
        const { units, tactical, factionId, scaleId } = JSON.parse(saved);
        const rehydratedUnits = (units || []).map(entry => {
          const unit = ZERG_UNITS.find(u => u.id === entry.unitId);
          if (!unit) return null;
          return { unit, tier: entry.tier, cost: entry.cost, selectedUpgrades: entry.selectedUpgrades || [] };
        }).filter(Boolean);
        const rehydratedTactical = (tactical || []).map(id => ZERG_TACTICAL_CARDS.find(t => t.id === id)).filter(Boolean);
        setArmyUnits(rehydratedUnits);
        setArmyTactical(rehydratedTactical);
        const faction = ZERG_FACTION_CARDS.find(f => f.id === factionId);
        if (faction) setSelectedFaction(faction);
        const scale = ENGAGEMENT_SCALES.find(s => s.id === scaleId);
        if (scale) setSelectedScale(scale);
      }
    } catch (e) { console.error(e); }
  }, []);

  useEffect(() => {
    const toSave = {
      units: armyUnits.map(entry => ({ unitId: entry.unit.id, tier: entry.tier, cost: entry.cost, selectedUpgrades: entry.selectedUpgrades })),
      tactical: armyTactical.map(t => t.id),
      factionId: selectedFaction?.id,
      scaleId: selectedScale?.id
    };
    localStorage.setItem('sc-tmg-zerg-v3', JSON.stringify(toSave));
  }, [armyUnits, armyTactical, selectedFaction, selectedScale]);

  const handleAddUnit = useCallback((unit) => setTierPicker(unit), []);
  const handleSelectTier = useCallback((unit, tier) => { setArmyUnits(prev => [...prev, { unit, tier, cost: tier.cost, selectedUpgrades: [] }]); setTierPicker(null); }, []);
  const handleRemoveUnit = useCallback((idx) => setArmyUnits(prev => prev.filter((_, i) => i !== idx)), []);
  const handleToggleUpgrade = useCallback((unitIdx, upgrade) => { setArmyUnits(prev => prev.map((entry, i) => { if (i !== unitIdx) return entry; const isSelected = entry.selectedUpgrades.some(u => u.name === upgrade.name); return { ...entry, selectedUpgrades: isSelected ? entry.selectedUpgrades.filter(u => u.name !== upgrade.name) : [...entry.selectedUpgrades, upgrade] }; })); }, []);
  
  const handleAddTactical = useCallback((card) => {
    if (card.unique && armyTactical.some(t => t.id === card.id)) return;
    setArmyTactical(prev => [...prev, card]);
  }, [armyTactical]);
  const handleRemoveTactical = useCallback((idx) => setArmyTactical(prev => prev.filter((_, i) => i !== idx)), []);
  
  const [showClearConfirm, setShowClearConfirm] = useState(false);
  const [exportText, setExportText] = useState(null);
  
  const handleClearArmy = useCallback(() => { setArmyUnits([]); setArmyTactical([]); setShowClearConfirm(false); }, []);
  const handleExport = useCallback(() => {
    const lines = [`=== ${selectedFaction?.name || 'Zerg'} Army ===`, `${selectedScale.name}`, ''];
    
    // Calculate warnings
    const warnings = [];
    if (selectedScale.id !== 'grand') {
      if (minerals > selectedScale.minerals) warnings.push(`⚠ MINERALS: ${minerals}/${selectedScale.minerals}`);
      if (gas > selectedScale.gas) warnings.push(`⚠ GAS: ${gas}/${selectedScale.gas}`);
    }
    const currentSlotsUsed = { hero: 0, elite: 0, core: 0, support: 0 };
    armyUnits.forEach(u => {
      const role = u.unit.role.toLowerCase();
      if (currentSlotsUsed[role] !== undefined) currentSlotsUsed[role] += u.tier.supply || 1;
    });
    const currentTotalSlots = { ...(selectedFaction?.slots || {}) };
    armyTactical.forEach(t => {
      Object.entries(t.slots).forEach(([slot, count]) => {
        currentTotalSlots[slot] = (currentTotalSlots[slot] || 0) + count;
      });
    });
    Object.entries(currentSlotsUsed).forEach(([slot, used]) => {
      const available = currentTotalSlots[slot] || 0;
      if (used > available) warnings.push(`⚠ ${slot.toUpperCase()}: ${used}/${available}`);
    });
    if (warnings.length > 0) {
      lines.push(...warnings, '');
    }
    
    // Tactical Cards
    if (armyTactical.length > 0) {
      lines.push('── TACTICAL CARDS ──', '');
      armyTactical.forEach(t => {
        lines.push(`▸ ${t.name}${t.unique ? ' [Unique]' : ''} - ${t.cost} Gas`);
        if (t.resource) lines.push(`  Resource: ${t.resource}`);
        if (Object.keys(t.slots).length > 0) {
          lines.push(`  Slots: ${Object.entries(t.slots).map(([s, c]) => `${s.toUpperCase()} +${c}`).join(', ')}`);
        }
        t.abilities.forEach(a => {
          lines.push(`  • ${a.name} (${a.phase} · ${a.type})`);
          lines.push(`    ${a.description}`);
        });
        lines.push('');
      });
    }
    
    // Units
    if (armyUnits.length > 0) {
      lines.push('── UNITS ──', '');
      armyUnits.forEach(entry => {
        const { unit, tier, selectedUpgrades } = entry;
        const upgCost = selectedUpgrades.reduce((sum, u) => { const cost = typeof u.cost === 'string' ? parseInt(u.cost.split('/')[0]) : u.cost; return sum + (cost || 0); }, 0);
        const unitTotal = entry.cost + upgCost;
        
        lines.push(`▸ ${unit.name}${unit.unique ? ' [Unique]' : ''} - ${unitTotal} pts`);
        lines.push(`  ${tier.models} models · Supply ${tier.supply} · ${unit.role}`);
        lines.push(`  Tags: ${unit.tags.join(', ')}`);
        
        // Stats
        const stats = unit.stats;
        lines.push(`  Stats: SH ${stats.shield ?? '—'} | SP ${stats.speed} | EV ${stats.evade ?? '—'} | AR ${stats.armour} | HP ${stats.hp} | SZ ${stats.size}`);
        
        // Weapons
        if (unit.weapons.length > 0) {
          lines.push('  Weapons:');
          unit.weapons.forEach(w => {
            lines.push(`    • ${w.name} (${w.phase})`);
            lines.push(`      RNG ${w.range} | TGT ${w.target} | RoA ${w.roa} | Hit ${w.hit} | Surge ${w.surge || '—'} | S.Die ${w.sDie || '—'} | Dmg ${w.damage}`);
            if (w.keywords?.length > 0) lines.push(`      Keywords: ${w.keywords.join(', ')}`);
          });
        }
        
        // Abilities
        const allAbilities = [...(unit.abilities || []), ...Object.entries(unit.phaseAbilities || {}).flatMap(([phase, abs]) => abs.map(a => ({ ...a, phase })))];
        if (allAbilities.length > 0) {
          lines.push('  Abilities:');
          allAbilities.forEach(a => {
            lines.push(`    • ${a.name} (${a.phase} · ${a.type})`);
            lines.push(`      ${a.description}`);
          });
        }
        
        // Selected Upgrades
        if (selectedUpgrades.length > 0) {
          lines.push('  Selected Upgrades:');
          selectedUpgrades.forEach(u => {
            lines.push(`    ✓ ${u.name} (${u.phase} · ${u.cost} pts · ${u.type})`);
            lines.push(`      ${u.description}`);
          });
        }
        
        lines.push('');
      });
    }
    
    // Summary
    lines.push('── SUMMARY ──');
    lines.push(`Spent: ${minerals} Minerals | ${gas} Gas`);
    if (selectedScale.id !== 'grand') {
      lines.push(`Remaining: ${mineralsRemaining} Minerals | ${gasRemaining} Gas`);
    }
    lines.push(`Total Supply: ${supply}`);
    
    setExportText(lines.join('\n'));
  }, [armyUnits, armyTactical, selectedFaction, selectedScale, minerals, gas, mineralsRemaining, gasRemaining, supply]);

  const unitIdsInArmy = armyUnits.map(u => u.unit.id);
  const tacticalIdsInArmy = armyTactical.map(t => t.id);

  return (
    <div className="app"><a href="index.html" className="home-btn" title="Home">←</a>
      <style>{`
        :root { --bg:#1a1a1a; --panel:#242424; --panel-2:#2a2a2a; --panel-3:#303030; --text:#f0eee8; --muted:#a8a299; --border:#3a3a3a; --accent:#8b5cf6; --zerg-accent:#9333ea; --success:#22c55e; --warning:#eab308; --error:#ef4444; --gas:#22d3ee; --radius:16px; --radius-sm:10px; --role-hero:#f59e0b; --role-elite:#a855f7; --role-core:#3b82f6; --role-support:#22c55e; --role-other:#6b7280; --tactical:#06b6d4; --glossary:#ec4899; }

        .faction-option.active { border-color:var(--zerg-accent); color:var(--text); background:rgba(147,51,234,0.1); }

        .scale-option.active { border-color:var(--accent); color:var(--text); background:rgba(139,92,246,0.1); }

        .unit-name { font-size:1.1rem; font-weight:700; line-height:1.2; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .unique-badge { font-size:0.6rem; background:var(--zerg-accent); color:white; padding:2px 6px; border-radius:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; }
        .psionic-badge { font-size:0.6rem; background:var(--accent); color:white; padding:2px 6px; border-radius:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; }
        .plus-btn { width:32px; height:32px; border-radius:50%; border:1px solid var(--border); background:rgba(255,255,255,0.04); color:var(--text); font-size:20px; display:grid; place-items:center; cursor:pointer; transition:all 0.15s; flex-shrink:0; }
        .plus-btn:hover { background:var(--accent); border-color:var(--accent); }
        .plus-btn.small { width:26px; height:26px; font-size:16px; }
        .tag-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; align-items:center; }
        .tag-row.categorized { gap:4px; }
        .tag-group { display:flex; align-items:center; gap:4px; }
        .tag-label { font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.03em; margin-right:2px; }
        .tag-separator { color:var(--muted); font-size:0.8rem; margin:0 4px; }
        .tag { font-size:0.7rem; padding:3px 8px; border:1px solid var(--border); border-radius:999px; background:rgba(255,255,255,0.03); color:var(--muted); }
        .tag.type-tag { background:rgba(139,92,246,0.1); border-color:rgba(139,92,246,0.3); color:var(--text); }
        .tag.clickable { cursor:pointer; transition:all 0.15s; }
        .tag.clickable:hover { background:rgba(139,92,246,0.15); border-color:var(--accent); color:var(--text); }
        .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
        .stat-chip { display:flex; align-items:center; justify-content:center; gap:6px; padding:10px 8px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:var(--radius-sm); }
        .stat-abbr { font-size:0.7rem; color:var(--muted); font-weight:600; }
        .stat-value { font-size:1.15rem; font-weight:700; font-variant-numeric:tabular-nums; }
        .unit-body { padding:0 12px 14px; }
        
        .tier-table { width:100%; border-collapse:collapse; background:var(--panel); border-radius:var(--radius-sm); overflow:hidden; margin-bottom:12px; border:1px solid var(--border); }
        .tier-table th,.tier-table td { padding:10px 8px; text-align:center; font-variant-numeric:tabular-nums; }
        .tier-table th { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.04em; color:var(--muted); font-weight:600; border-bottom:1px solid var(--border); }
        .tier-table td { font-size:0.85rem; font-weight:600; border-bottom:1px solid rgba(255,255,255,0.04); }
        
        .section-block { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:8px; overflow:hidden; }
        .section-header { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; cursor:pointer; user-select:none; }
        .section-header-static { padding:12px 14px 4px; }
        .section-title { font-size:0.9rem; font-weight:600; }
        .section-block.open .chevron { transform:rotate(90deg); }
        .section-body { padding:0 10px 10px; }
        
        .weapon-table { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; margin-bottom:8px; }
        .weapon-table:last-child { margin-bottom:0; }
        .weapon-table-header { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-bottom:1px solid var(--border); }
        .weapon-table-name { font-weight:700; font-size:0.9rem; }
        .weapon-table-phase { font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; }
        .weapon-table-row { display:grid; grid-template-columns:repeat(4,1fr); }
        .weapon-table-row.alt { background:rgba(255,255,255,0.02); }
        .weapon-table-cell { padding:8px 6px; text-align:center; border-right:1px solid rgba(255,255,255,0.04); }
        .weapon-table-cell:last-child { border-right:none; }
        .weapon-table-cell span { display:block; font-size:0.55rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.03em; margin-bottom:2px; }
        .weapon-table-cell strong { font-size:0.8rem; font-weight:600; }
        .weapon-table-keywords { padding:8px 12px; border-top:1px solid var(--border); display:flex; flex-wrap:wrap; gap:6px; }
        
        .ability { background:var(--panel-3); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:8px; overflow:hidden; }
        .ability.glossary-entry { border-left:3px solid var(--glossary); }
        .ability.glossary-entry.tag-entry { border-left-color:var(--accent); }
        .ability:last-child { margin-bottom:0; }
        .glossary-section-header { font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:var(--muted); padding:8px 4px; margin-bottom:8px; border-bottom:1px solid var(--border); }
        .ability-header-static { padding:10px 12px 4px; }
        .ability-title { font-size:0.88rem; font-weight:600; }
        .ability-meta { font-size:0.75rem; color:var(--muted); margin-top:2px; }
        .ability-body { padding:0 12px 10px; font-size:0.85rem; line-height:1.5; }
        .keyword { background:rgba(139,92,246,0.2); color:#a78bfa; padding:1px 4px; border-radius:4px; cursor:pointer; font-weight:500; transition:background 0.15s; }
        .keyword:hover { background:rgba(139,92,246,0.35); }
        
        /* Tactical Card */
        .tactical-card { background:var(--panel-3); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; border-left:3px solid var(--tactical); }
        .tactical-card.in-army { border-color:var(--gas); }
        .tactical-header { padding:12px 14px; cursor:pointer; user-select:none; }
        .tactical-title-row { display:flex; justify-content:space-between; align-items:center; }
        .tactical-name { font-size:1rem; font-weight:700; display:flex; align-items:center; gap:8px; }
        .tactical-right { display:flex; align-items:center; gap:10px; }
        .tactical-cost { font-size:0.85rem; font-weight:700; color:var(--gas); }
        .tactical-info { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
        .tactical-pill { font-size:0.7rem; padding:3px 8px; border:1px solid var(--border); border-radius:999px; background:rgba(255,255,255,0.03); color:var(--muted); }
        .tactical-body { padding:0 12px 12px; }
        
        .army-upgrade { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:var(--panel-2); border-radius:var(--radius-sm); margin-bottom:6px; }
        .army-upgrade-card { background:var(--panel-2); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:8px; overflow:hidden; }
        .army-upgrade-card.selected { border-color:var(--accent); background:rgba(139,92,246,0.1); }
        .army-upgrade-card:last-child { margin-bottom:0; }
        .army-upgrade-header { display:flex; justify-content:space-between; align-items:flex-start; padding:10px 12px; }
        .army-upgrade-name { font-weight:600; font-size:0.9rem; }
        .army-upgrade-meta { font-size:0.75rem; color:var(--muted); margin-top:2px; }
        .army-upgrade-desc { padding:0 12px 10px; font-size:0.85rem; line-height:1.5; color:var(--text); }
        .upgrade-toggle { width:20px; height:20px; border-radius:4px; border:2px solid var(--border); background:transparent; cursor:pointer; display:grid; place-items:center; transition:all 0.15s; }
        .upgrade-toggle.active { background:var(--accent); border-color:var(--accent); }
        .upgrade-toggle.active::after { content:'✓'; color:white; font-size:12px; font-weight:700; }
        .remove-unit { padding:8px 16px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:var(--radius-sm); color:var(--error); font-size:0.85rem; font-weight:600; cursor:pointer; margin-top:12px; width:100%; }
        
        /* Modal */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:grid; place-items:center; z-index:1000; padding:20px; animation:fadeIn 0.15s; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .modal { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); max-width:380px; width:100%; max-height:80vh; overflow-y:auto; animation:slideUp 0.2s; }
        @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .modal-header { padding:16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .modal-title { font-weight:700; font-size:1.1rem; }
        .modal-type { font-size:0.8rem; color:var(--muted); margin-top:2px; }
        .modal-close { width:32px; height:32px; border-radius:50%; border:none; background:var(--panel-2); color:var(--muted); font-size:18px; cursor:pointer; display:grid; place-items:center; }
        .modal-body { padding:16px; font-size:0.9rem; line-height:1.6; }
        .tier-option { padding:14px; background:var(--panel-2); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:8px; cursor:pointer; transition:all 0.15s; }
        .tier-option:hover { border-color:var(--accent); }
        .tier-option-main { display:flex; justify-content:space-between; align-items:center; }
        .tier-option-models { font-weight:600; }
        .tier-option-cost { color:var(--warning); font-weight:600; }
        .tier-option-supply { font-size:0.8rem; color:var(--muted); margin-top:4px; }
        .empty-state { text-align:center; padding:30px 20px; color:var(--muted); }
        .empty-state-text { font-size:0.85rem; }
      `}</style>

      {/* Faction & Scale Selector */}
      <Collapsible
        className="group-card"
        defaultOpen={true}
        header={<div className="group-header"><div><div className="group-title">Setup</div><div className="group-subtitle">{selectedFaction?.name} · {selectedScale?.name}</div></div><span className="chevron">›</span></div>}
      >
        <div className="group-body" style={{ gap: 12 }}>
          <div className="selector-group">
            <div className="faction-label">Faction Card</div>
            <div className="faction-options">
              {ZERG_FACTION_CARDS.map(f => (
                <button key={f.id} className={`faction-option ${selectedFaction?.id === f.id ? 'active' : ''}`} onClick={() => setSelectedFaction(f)}>
                  {f.name.replace("Kerrigan's ", '').replace(' Swarm', '')}
                </button>
              ))}
            </div>
          </div>
          <div className="selector-group">
            <div className="faction-label">Battle Size</div>
            <div className="scale-options">
              {ENGAGEMENT_SCALES.map(s => (
                <button key={s.id} className={`scale-option ${selectedScale?.id === s.id ? 'active' : ''}`} onClick={() => setSelectedScale(s)}>
                  <span className="scale-name">{s.name}</span>
                  <span className="scale-limits">{s.id === 'grand' ? '2000+' : s.minerals} / {s.id === 'grand' ? '200+' : s.gas}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      </Collapsible>

      {/* Army Header - Sticky */}
      <div className={`army-header ${headerOpen ? 'open' : ''}`}>
        <div className="army-header-top" onClick={() => setHeaderOpen(!headerOpen)}>
          <div className="army-title">Army</div>
          <div className="army-header-summary">
            <span className={`minerals ${mineralsOver ? 'over' : ''}`}>{mineralsRemaining} min</span>
            <span className={`gas ${gasOver ? 'over' : ''}`}>{gasRemaining} gas</span>
            <span>S{supply}</span>
          </div>
          <span className="chevron">›</span>
        </div>
        {headerOpen && (
          <div className="army-header-body">
            <div className="army-stats">
              <div className="army-stat">
                <div className="army-stat-label">Minerals Left</div>
                <div className={`army-stat-value minerals ${mineralsOver ? 'over' : ''}`}>{mineralsRemaining}</div>
              </div>
              <div className="army-stat">
                <div className="army-stat-label">Gas Left</div>
                <div className={`army-stat-value gas ${gasOver ? 'over' : ''}`}>{gasRemaining}</div>
              </div>
              <div className="army-stat">
                <div className="army-stat-label">Supply</div>
                <div className="army-stat-value">{supply}</div>
              </div>
            </div>
            <div className="army-slots">
              {Object.entries(totalSlots).map(([slot, available]) => {
                const used = slotsUsed[slot] || 0;
                return <span key={slot} className={`slot-badge ${used > available ? 'over' : 'ok'}`}>{slot.toUpperCase()}: {used}/{available}</span>;
              })}
            </div>
            <div className="army-actions">
              <button className="army-btn" onClick={handleExport}>Export</button>
              <button className="army-btn danger" onClick={() => setShowClearConfirm(true)}>Clear</button>
            </div>
          </div>
        )}
      </div>

      {/* Your Army Divider */}
      {(armyUnits.length > 0 || armyTactical.length > 0) && (
        <div className="library-divider">
          <div className="library-divider-line"></div>
          <span className="library-divider-text">Your Army</span>
          <div className="library-divider-line"></div>
        </div>
      )}

      {/* Army Units List */}
      {(armyUnits.length > 0 || armyTactical.length > 0) && (
        <div className="army-section">
          {armyTactical.length > 0 && (
            <>
              <div className="army-section-title">Tactical Cards</div>
              {armyTactical.map((card, idx) => (
                <ArmyTacticalCard key={idx} card={card} onRemove={() => handleRemoveTactical(idx)} onKeywordClick={setKeywordModal} />
              ))}
            </>
          )}
          {armyUnits.length > 0 && (
            <>
              <div className="army-section-title" style={{ marginTop: armyTactical.length > 0 ? 12 : 0 }}>Units</div>
              {armyUnits.map((entry, idx) => (
                <ArmyUnitCard key={idx} entry={entry} onRemove={() => handleRemoveUnit(idx)} onToggleUpgrade={(upg) => handleToggleUpgrade(idx, upg)} onKeywordClick={setKeywordModal} />
              ))}
            </>
          )}
        </div>
      )}

      {/* Library Divider */}
      <div className="library-divider">
        <div className="library-divider-line"></div>
        <span className="library-divider-text">Card Library</span>
        <div className="library-divider-line"></div>
      </div>

      {/* Units Browser */}
      <Collapsible 
        className="group-card" 
        defaultOpen={false}
        header={<div className="group-header"><div><div className="group-title">Units</div><div className="group-subtitle">{ZERG_UNITS.length} available</div></div><span className="chevron">›</span></div>}
      >
        <div className="group-body">
          {['Hero', 'Elite', 'Core', 'Support', 'Other'].map(role => {
            const unitsInRole = ZERG_UNITS.filter(u => u.role === role);
            if (unitsInRole.length === 0) return null;
            return (
              <div key={role} className="role-group">
                <div className={`role-group-header role-${role.toLowerCase()}`}>
                  <span className="role-group-dot"></span>
                  <span className="role-group-name">{role}</span>
                  <span className="role-group-count">{unitsInRole.length}</span>
                </div>
                {unitsInRole.map(unit => (
                  <UnitCard 
                    key={unit.id} 
                    unit={unit} 
                    onAddToArmy={handleAddUnit} 
                    onKeywordClick={setKeywordModal}
                    isInArmy={unitIdsInArmy.includes(unit.id)}
                  />
                ))}
              </div>
            );
          })}
        </div>
      </Collapsible>

      {/* Tactical Cards Browser */}
      <Collapsible 
        className="group-card" 
        defaultOpen={false}
        header={<div className="group-header"><div><div className="group-title">Tactical Cards</div><div className="group-subtitle">{ZERG_TACTICAL_CARDS.length} available</div></div><span className="chevron">›</span></div>}
      >
        <div className="group-body">
          {ZERG_TACTICAL_CARDS.map(card => (
            <TacticalCard 
              key={card.id} 
              card={card} 
              onKeywordClick={setKeywordModal}
              onAddToArmy={handleAddTactical}
              isInArmy={tacticalIdsInArmy.includes(card.id)}
            />
          ))}
        </div>
      </Collapsible>

      {/* Glossary */}
      <Collapsible 
        className="group-card" 
        defaultOpen={false}
        header={<div className="group-header"><div><div className="group-title">Glossary</div><div className="group-subtitle">Tags & Keywords reference</div></div><span className="chevron">›</span></div>}
      >
        <div className="group-body">
          <div className="glossary-section-header">Surge Tags</div>
          {Object.entries(TAGS).filter(([tag]) => SURGE_TAGS.includes(tag)).sort(([a], [b]) => a.localeCompare(b)).map(([tag, data]) => (
            <div key={tag} className="ability open glossary-entry tag-entry">
              <div className="ability-header-static"><div><div className="ability-title">{tag}</div><div className="ability-meta">{data.type}</div></div></div>
              <div className="ability-body">{data.description}</div>
            </div>
          ))}
          <div className="glossary-section-header" style={{ marginTop: 16 }}>Type Tags</div>
          {Object.entries(TAGS).filter(([tag]) => TYPE_TAGS.includes(tag)).sort(([a], [b]) => a.localeCompare(b)).map(([tag, data]) => (
            <div key={tag} className="ability open glossary-entry tag-entry">
              <div className="ability-header-static"><div><div className="ability-title">{tag}</div><div className="ability-meta">{data.type}</div></div></div>
              <div className="ability-body">{data.description}</div>
            </div>
          ))}
          <div className="glossary-section-header" style={{ marginTop: 16 }}>Special Tags</div>
          {Object.entries(TAGS).filter(([tag]) => !SURGE_TAGS.includes(tag) && !TYPE_TAGS.includes(tag)).sort(([a], [b]) => a.localeCompare(b)).map(([tag, data]) => (
            <div key={tag} className="ability open glossary-entry tag-entry">
              <div className="ability-header-static"><div><div className="ability-title">{tag}</div><div className="ability-meta">{data.type}</div></div></div>
              <div className="ability-body">{data.description}</div>
            </div>
          ))}
          <div className="glossary-section-header" style={{ marginTop: 16 }}>Keywords</div>
          {Object.entries(KEYWORDS).sort(([a], [b]) => a.localeCompare(b)).map(([keyword, data]) => (
            <div key={keyword} className="ability open glossary-entry">
              <div className="ability-header-static"><div><div className="ability-title">{keyword}</div><div className="ability-meta">{data.type}</div></div></div>
              <div className="ability-body">{data.description}</div>
            </div>
          ))}
        </div>
      </Collapsible>

      {/* Modals */}
      {keywordModal && <KeywordModal keyword={keywordModal} onClose={() => setKeywordModal(null)} />}
      {tierPicker && <TierPickerModal unit={tierPicker} onSelect={handleSelectTier} onClose={() => setTierPicker(null)} />}
      {showClearConfirm && (
        <div className="modal-overlay" onClick={() => setShowClearConfirm(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div><div className="modal-title">Clear Army?</div><div className="modal-type">This will remove all units and tactical cards</div></div>
              <button className="modal-close" onClick={() => setShowClearConfirm(false)}>×</button>
            </div>
            <div className="modal-body" style={{ display: 'flex', gap: 8 }}>
              <button className="army-btn" style={{ flex: 1 }} onClick={() => setShowClearConfirm(false)}>Cancel</button>
              <button className="remove-unit" style={{ flex: 1, marginTop: 0 }} onClick={handleClearArmy}>Clear Army</button>
            </div>
          </div>
        </div>
      )}
      {exportText && (
        <div className="modal-overlay" onClick={() => setExportText(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 420 }}>
            <div className="modal-header">
              <div><div className="modal-title">Export Army</div><div className="modal-type">Copy the text below</div></div>
              <button className="modal-close" onClick={() => setExportText(null)}>×</button>
            </div>
            <div className="modal-body">
              <textarea 
                readOnly 
                value={exportText} 
                style={{ width: '100%', height: 200, background: 'var(--panel-2)', border: '1px solid var(--border)', borderRadius: 8, padding: 12, color: 'var(--text)', fontSize: '0.85rem', fontFamily: 'monospace', resize: 'none' }}
                onFocus={e => e.target.select()}
              />
              <button className="army-btn" style={{ width: '100%', marginTop: 12 }} onClick={() => setExportText(null)}>Done</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
  </script>
</body>
</html>
