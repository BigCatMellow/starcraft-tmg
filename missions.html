const MapDiagram = ({ map }) => {
  const scale = 6; // pixels per inch
  const w = map.width * scale;
  const h = map.height * scale;
  
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="map-svg">
      {/* Background */}
      <rect x="0" y="0" width={w} height={h} fill="var(--panel-2)" />
      
      {/* Grid lines */}
      {[...Array(Math.floor(map.width / 6) + 1)].map((_, i) => (
        <line key={`v${i}`} x1={i * 6 * scale} y1="0" x2={i * 6 * scale} y2={h} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="2,2" />
      ))}
      {[...Array(Math.floor(map.height / 6) + 1)].map((_, i) => (
        <line key={`h${i}`} x1="0" y1={i * 6 * scale} x2={w} y2={i * 6 * scale} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="2,2" />
      ))}
      
      {/* Red deployment zones */}
      {map.redZones.map((zone, i) => (
        <rect key={`r${i}`} x={zone.x * scale} y={zone.y * scale} width={zone.w * scale} height={zone.h * scale} fill="rgba(239, 68, 68, 0.3)" stroke="#ef4444" strokeWidth="1.5" />
      ))}
      
      {/* Blue deployment zones */}
      {map.blueZones.map((zone, i) => (
        <rect key={`b${i}`} x={zone.x * scale} y={zone.y * scale} width={zone.w * scale} height={zone.h * scale} fill="rgba(59, 130, 246, 0.3)" stroke="#3b82f6" strokeWidth="1.5" />
      ))}
      
      {/* Mission markers */}
      {map.markers.map((marker) => (
        <g key={marker.num}>
          <circle cx={marker.x * scale} cy={marker.y * scale} r={12} fill={marker.num === 5 ? 'var(--accent)' : 'var(--panel-3)'} stroke="var(--text)" strokeWidth="2" />
          <text x={marker.x * scale} y={marker.y * scale + 1} textAnchor="middle" dominantBaseline="middle" fill={marker.num === 5 ? '#000' : 'var(--text)'} fontSize="12" fontWeight="700">{marker.num}</text>
        </g>
      ))}
      
      {/* Border */}
      <rect x="0" y="0" width={w} height={h} fill="none" stroke="var(--text)" strokeWidth="2" />
    </svg>
  );
};

function App() {
  const [selectedMission, setSelectedMission] = useState(null);
  const [selectedMap, setSelectedMap] = useState(null);
  const [battleSize, setBattleSize] = useState('standard');
  const [missionExpanded, setMissionExpanded] = useState(false);
  const [mapExpanded, setMapExpanded] = useState(false);
  const [showExportModal, setShowExportModal] = useState(false);
  
  const standardMissions = MISSIONS.filter(m => m.type === 'Standard');
  const skirmishMissions = MISSIONS.filter(m => m.type === 'Skirmish');
  const standardMaps = MAPS.filter(m => m.type === 'Standard');
  const skirmishMaps = MAPS.filter(m => m.type === 'Skirmish');
  
  const activeMissions = battleSize === 'standard' ? standardMissions : skirmishMissions;
  const activeMaps = battleSize === 'standard' ? standardMaps : skirmishMaps;
  
  const selectMission = (mission) => {
    if (selectedMission?.id === mission.id) {
      setSelectedMission(null);
      setMissionExpanded(false);
    } else {
      setSelectedMission(mission);
    }
  };
  
  const selectMap = (map) => {
    if (selectedMap?.id === map.id) {
      setSelectedMap(null);
      setMapExpanded(false);
    } else {
      setSelectedMap(map);
    }
  };
  
  const randomMission = () => {
    const pool = activeMissions.filter(m => m.id !== selectedMission?.id);
    if (pool.length > 0) {
      setSelectedMission(pool[Math.floor(Math.random() * pool.length)]);
      setMissionExpanded(false);
    }
  };
  
  const randomMap = () => {
    const pool = activeMaps.filter(m => m.id !== selectedMap?.id);
    if (pool.length > 0) {
      setSelectedMap(pool[Math.floor(Math.random() * pool.length)]);
      setMapExpanded(false);
    }
  };
  
  const randomBoth = () => {
    setSelectedMission(activeMissions[Math.floor(Math.random() * activeMissions.length)]);
    setSelectedMap(activeMaps[Math.floor(Math.random() * activeMaps.length)]);
    setMissionExpanded(false);
    setMapExpanded(false);
  };
  
  const clearSetup = () => {
    setSelectedMission(null);
    setSelectedMap(null);
    setMissionExpanded(false);
    setMapExpanded(false);
  };
  
  const handleBattleSizeChange = (size) => {
    setBattleSize(size);
    if (selectedMission && selectedMission.type.toLowerCase() !== size) {
      setSelectedMission(null);
      setMissionExpanded(false);
    }
    if (selectedMap && selectedMap.type.toLowerCase() !== size) {
      setSelectedMap(null);
      setMapExpanded(false);
    }
  };
  
  const generateExport = () => {
    let text = `═══════════════════════════════════════\n`;

        .map-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; padding: 10px 12px; background: var(--panel-2); border-radius: var(--radius-sm); }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--muted); }
        .legend-box { width: 16px; height: 12px; border-radius: 3px; }
        .legend-box.red { background: rgba(239, 68, 68, 0.3); border: 1px solid #ef4444; }
        .legend-box.blue { background: rgba(59, 130, 246, 0.3); border: 1px solid #3b82f6; }
        .legend-marker { width: 18px; height: 18px; border-radius: 50%; background: var(--panel-3); border: 1.5px solid var(--text); display: grid; place-items: center; font-size: 0.65rem; font-weight: 700; }
        
        .map-markers { padding: 10px 12px; background: var(--panel-2); border-radius: var(--radius-sm); margin-bottom: 12px; }
        .map-markers-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 8px; }
        .marker-list { display: flex; flex-direction: column; gap: 6px; }
        .marker-row { display: flex; align-items: flex-start; gap: 10px; }
        .marker-badge { width: 22px; height: 22px; border-radius: 50%; background: var(--panel-3); border: 2px solid var(--text); display: grid; place-items: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
        .marker-badge.center { background: var(--accent); color: #000; border-color: var(--accent); }
        .marker-desc { font-size: 0.8rem; color: var(--text); line-height: 1.4; padding-top: 2px; }
        
        .setup-section { padding: 12px; background: var(--panel-2); border-radius: var(--radius-sm); margin-bottom: 12px; }
        .setup-section.red { border-left: 3px solid #ef4444; }
        .setup-section.blue { border-left: 3px solid #3b82f6; }
        .setup-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .setup-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .setup-dot.red { background: #ef4444; }
        .setup-dot.blue { background: #3b82f6; }
        .setup-instructions { display: flex; flex-direction: column; gap: 8px; }
        .setup-step { font-size: 0.8rem; color: var(--text); line-height: 1.5; padding-left: 18px; position: relative; }
        .setup-step::before { content: '•'; position: absolute; left: 0; color: var(--muted); }
        
        .map-notes { font-size: 0.8rem; color: var(--muted); font-style: italic; line-height: 1.4; padding: 10px 12px; background: rgba(234, 179, 8, 0.08); border-radius: var(--radius-sm); border-left: 2px solid var(--accent); }
        
        /* Divider */
        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0 12px; }
        .divider-line { flex: 1; height: 1px; background: var(--border); }
        .divider-text { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
        
        /* Export Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
        .modal { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 440px; max-height: 80vh; display: flex; flex-direction: column; }
        .modal-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 1.1rem; font-weight: 700; }
        .modal-close { width: 32px; height: 32px; border: none; border-radius: 50%; background: var(--panel-2); color: var(--text); font-size: 1.2rem; cursor: pointer; display: grid; place-items: center; }
        .modal-body { flex: 1; overflow: auto; padding: 16px; }
        .export-text { width: 100%; min-height: 300px; background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-family: monospace; font-size: 0.75rem; color: var(--text); resize: none; line-height: 1.5; }
        .modal-hint { font-size: 0.75rem; color: var(--muted); margin-top: 8px; text-align: center; }
        
        /* Selected Setup Card */
        .setup-card { background: var(--panel); border: 1px solid var(--accent); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
        .setup-card-header { display: flex; align-items: center; padding: 14px; cursor: pointer; user-select: none; gap: 12px; background: rgba(234, 179, 8, 0.08); }
        .setup-card-type { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--accent); background: rgba(234, 179, 8, 0.15); padding: 3px 8px; border-radius: 4px; }
        .setup-card-info { flex: 1; }
        .setup-card-name { font-size: 1rem; font-weight: 700; }
        .setup-card-meta { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
        .setup-card-actions { display: flex; gap: 6px; }
        .setup-card-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--panel-2); color: var(--muted); font-size: 0.75rem; font-weight: 600; cursor: pointer; }
        .setup-card-btn:hover { background: var(--panel-3); color: var(--text); }
        .setup-card-btn.random { border-color: var(--accent); color: var(--accent); }
        .setup-card-btn.remove { border-color: var(--error); color: var(--error); }
        .setup-card-body { padding: 0 14px 14px; }
        
        /* Group Card */
        .group-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
        .group-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; user-select: none; }
        .group-title { font-size: 1.1rem; font-weight: 700; }
        .group-subtitle { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
        .group-card.open .chevron { transform: rotate(90deg); }
        .group-body { padding: 0 12px 12px; }
      `}</style>

      <div className="app-header">
        <div className="app-title">StarCraft TMG</div>
        <div className="app-subtitle">Missions & Maps</div>
      </div>

      {/* Battle Size Selector */}
      <Collapsible
        className="group-card"
        defaultOpen={true}
        header={
          <div className="group-header">
            <div>
              <div className="group-title">Battle Size</div>
              <div className="group-subtitle">{battleSize === 'standard' ? 'Standard · 54" × 36" · 2000 Minerals' : 'Skirmish · 36" × 36" · 1000 Minerals'}</div>
            </div>
            <span className="chevron">›</span>
          </div>
        }
      >
        <div className="group-body">
          <div className="size-selector">
            <button 
              className={`size-btn ${battleSize === 'standard' ? 'active' : ''}`}
              onClick={() => handleBattleSizeChange('standard')}
            >
              <div className="size-name">Standard</div>
              <div className="size-meta">54" × 36" · 2000 Minerals</div>
            </button>
            <button 
              className={`size-btn ${battleSize === 'skirmish' ? 'active' : ''}`}
              onClick={() => handleBattleSizeChange('skirmish')}
            >
              <div className="size-name">Skirmish</div>
              <div className="size-meta">36" × 36" · 1000 Minerals</div>
            </button>
          </div>
        </div>
      </Collapsible>

      {/* Battle Setup Header */}
      <Collapsible
        className="group-card"
        defaultOpen={true}
        header={
          <div className="group-header">
            <div>
              <div className="group-title">Battle Setup</div>
              <div className="group-subtitle">
                {selectedMission ? selectedMission.name : 'No mission'} · {selectedMap ? selectedMap.name : 'No map'}
              </div>
            </div>
            <span className="chevron">›</span>
          </div>
        }
      >
        <div className="group-body">
          <div className="setup-panel-actions" style={{marginBottom: 12}}>
            <button className="action-btn accent" onClick={randomBoth}>🎲 Random Both</button>
            {(selectedMission || selectedMap) && (
              <>
                <button className="action-btn" onClick={() => setShowExportModal(true)}>📋 Export</button>
                <button className="action-btn danger" onClick={clearSetup}>✕ Clear</button>
              </>
            )}
          </div>

          {/* Selected Mission */}
          {selectedMission ? (
            <div className="setup-card">
              <div className="setup-card-header" onClick={() => setMissionExpanded(!missionExpanded)}>
                <span className="setup-card-type">Mission</span>
                <div className="setup-card-info">
                  <div className="setup-card-name">{selectedMission.name}</div>
                  <div className="setup-card-meta">{selectedMission.gameLength} Rounds · Supply {selectedMission.supply} · {selectedMission.perRound}/rnd</div>
                </div>
                <div className="setup-card-actions">
                  <button className="setup-card-btn random" onClick={(e) => { e.stopPropagation(); randomMission(); }}>🎲</button>
                  <button className="setup-card-btn remove" onClick={(e) => { e.stopPropagation(); setSelectedMission(null); setMissionExpanded(false); }}>✕</button>
                </div>
                <span className="chevron" style={{transform: missionExpanded ? 'rotate(90deg)' : 'none'}}>›</span>
              </div>
              {missionExpanded && (
                <div className="setup-card-body">
                  <div className="mission-section">
                    <div className="mission-section-title">Mission Parameters</div>
                    {selectedMission.parameters.map((p, i) => <div key={i} className="mission-rule">{p}</div>)}
                  </div>
                  <div className="mission-section">
                    <div className="mission-section-title">Scoring Conditions</div>
                    {selectedMission.scoring.map((s, i) => <div key={i} className="mission-rule">{s}</div>)}
                  </div>
                  {selectedMission.additionalRules && (
                    <div className="mission-section">
                      <div className="mission-section-title">Additional Rules</div>
                      {selectedMission.additionalRules.map((r, i) => (
                        <div key={i} className="mission-ability">
                          <div className="mission-ability-name">{r.name} <span>({r.phase})</span></div>
                          <div className="mission-ability-desc">{r.description}</div>
                        </div>
                      ))}
                    </div>
                  )}
                  <div className="mission-section special">
                    <div className="mission-section-title">Special Winning Condition</div>
                    <div className="mission-rule">{selectedMission.special}</div>
                  </div>
                </div>
              )}
            </div>
          ) : (
            <div className="selected-slot">
              <div className="slot-header">
                <span className="slot-label">Mission</span>
                <button className="slot-btn random" onClick={randomMission}>🎲 Random</button>
              </div>
              <div className="slot-empty">Select a mission from the library below</div>
            </div>
          )}

          {/* Selected Map */}
          {selectedMap ? (
            <div className="setup-card">
              <div className="setup-card-header" onClick={() => setMapExpanded(!mapExpanded)}>
                <span className="setup-card-type">Map</span>
                <div className="setup-card-info">
                  <div className="setup-card-name">{selectedMap.name}</div>
                  <div className="setup-card-meta">{selectedMap.size}</div>
                </div>
                <div className="setup-card-actions">
                  <button className="setup-card-btn random" onClick={(e) => { e.stopPropagation(); randomMap(); }}>🎲</button>
                  <button className="setup-card-btn remove" onClick={(e) => { e.stopPropagation(); setSelectedMap(null); setMapExpanded(false); }}>✕</button>
                </div>
                <span className="chevron" style={{transform: mapExpanded ? 'rotate(90deg)' : 'none'}}>›</span>
              </div>
              {mapExpanded && (
                <div className="setup-card-body">
                  <MapDiagram map={selectedMap} />
                  <div className="map-legend">
                    <div className="legend-item"><span className="legend-box red"></span> Red Deployment</div>
                    <div className="legend-item"><span className="legend-box blue"></span> Blue Deployment</div>
                    <div className="legend-item"><span className="legend-marker">5</span> Objective Marker</div>
                  </div>
                  {selectedMap.redSetup && (
                    <div className="setup-section red">
                      <div className="setup-title"><span className="setup-dot red"></span> Red Deployment: {selectedMap.redSetup.title}</div>
                      <div className="setup-instructions">
                        {selectedMap.redSetup.instructions.map((inst, i) => <div key={i} className="setup-step">{inst}</div>)}
                      </div>
                    </div>
                  )}
                  {selectedMap.blueSetup && (
                    <div className="setup-section blue">
                      <div className="setup-title"><span className="setup-dot blue"></span> Blue Deployment: {selectedMap.blueSetup.title}</div>
                      <div className="setup-instructions">
                        {selectedMap.blueSetup.instructions.map((inst, i) => <div key={i} className="setup-step">{inst}</div>)}
                      </div>
                    </div>
                  )}
                  {selectedMap.markerSetup && (
                    <div className="map-markers">
                      <div className="map-markers-title">Mission Markers</div>
                      <div className="marker-list">
                        {selectedMap.markerSetup.sort((a, b) => a.num - b.num).map(m => (
                          <div key={m.num} className="marker-row">
                            <span className={`marker-badge ${m.num === 5 ? 'center' : ''}`}>{m.num}</span>
                            <span className="marker-desc">{m.desc}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  <div className="map-notes">{selectedMap.notes}</div>
                </div>
              )}
            </div>
          ) : (
            <div className="selected-slot">
              <div className="slot-header">
                <span className="slot-label">Map</span>
                <button className="slot-btn random" onClick={randomMap}>🎲 Random</button>
              </div>
              <div className="slot-empty">Select a map from the library below</div>
            </div>
          )}
        </div>
      </Collapsible>

      {/* Mission Library */}
      <div className="divider">
        <div className="divider-line"></div>
        <span className="divider-text">Mission Library</span>
        <div className="divider-line"></div>
      </div>

      {activeMissions.map(m => (
        <MissionCard 
          key={m.id} 
          mission={m} 
          selectable={true}
          selected={selectedMission?.id === m.id}
          onSelect={() => selectMission(m)}
        />
      ))}

      {/* Map Library */}
      <div className="divider">
        <div className="divider-line"></div>
        <span className="divider-text">Map Library</span>
        <div className="divider-line"></div>
      </div>

      {activeMaps.map(m => (
        <MapCard 
          key={m.id} 
          map={m}
          selectable={true}
          selected={selectedMap?.id === m.id}
          onSelect={() => selectMap(m)}
        />
      ))}

      {/* Export Modal */}
      {showExportModal && (
        <div className="modal-overlay" onClick={() => setShowExportModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">Export Battle Setup</div>
              <button className="modal-close" onClick={() => setShowExportModal(false)}>×</button>
            </div>
            <div className="modal-body">
              <textarea 
                className="export-text" 
                value={generateExport()} 
                readOnly 
                onClick={e => e.target.select()}
              />
              <div className="modal-hint">Tap to select all text, then copy</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
  </script>
</body>
</html>
